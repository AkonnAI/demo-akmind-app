// LESSON 2 — THE MEMORY WALL (History of AI) — 3 ROUNDS
// ============================================================
class Lesson2Scene {
  constructor() {
    this.time = 0
    this.bg = new Background('lesson2')
    this.nova = new Nova(120, 540, 0.15)
    this.hud = new HUD()
    this.dialogue = new DialogueBox()
    this.transition = new Transition()
    this.missionCard = new MissionCard()
    this.roundBanner = new RoundBanner()
    this.phase = 'mission' // mission, play, banner, finalDialogue, complete

    this.hud.setWorld('THE MEMORY WALL')
    this.hud.setObjective('TAP A FRAGMENT TO REVEAL — DRAG TO THE CORRECT YEAR')
    this.hud.setNovaPower(0.15)

    this.eras = MEMORY_WALL_ERAS_R1.slice()
    this.round3DialogueDone = false

    this.round = 0
    this.totalRounds = 3
    this.roundXP = 0
    this.totalXP = 0
    this.slots = []
    this.fragments = []
    this.cracks = []
    this.heldFragment = null
    this.placedCount = 0

    this.missionCard.show(
      'THE MEMORY WALL',
      "NOVA's memories of AI history have shattered into fragments. Five key moments are floating in the void — out of order, glitching, lost.",
      'TAP each fragment to reveal the year. DRAG it to the correct slot on the timeline wall. Restore all 5 memories to heal the wall.',
      () => { this.startRound(1) }
    )
  }

  startRound(n) {
    this.round = n
    this.roundXP = 0
    this.placedCount = 0
    this.heldFragment = null
    this.hud.setRound(n, this.totalRounds)
    this.nova.setExpression('idle')

    if (n === 1) this.eras = MEMORY_WALL_ERAS_R1.slice()
    else if (n === 2) this.eras = MEMORY_WALL_ERAS_R2.slice()
    else {
      this.eras = MEMORY_WALL_ERAS_R1.slice()
      this.round3DialogueDone = false
    }

    // Slots
    const slotW = 240, slotH = 140
    const totalW = this.eras.length * slotW + (this.eras.length - 1) * 24
    const pad = 60
    const startX = Math.max(pad, (CONFIG.W - totalW) / 2)

    let order = this.eras.map((_, i) => i)
    if (n >= 2) {
      for (let i = order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]]
      }
    }
    this.slots = order.map((eraIdx, i) => ({
      x: startX + i * (slotW + 24),
      y: CONFIG.H - 200,
      w: slotW, h: slotH,
      era: this.eras[eraIdx],
      filled: false,
      wrongFlash: 0, correctAnim: 0,
    }))

    this.cracks = Array.from({length: 8}, () => ({
      x: 400 + Math.random() * (CONFIG.W - 800),
      y: CONFIG.H - 200 - 40 - Math.random() * 220,
      len: 30 + Math.random() * 80,
      angle: Math.random() * Math.PI,
      healing: false,
    }))

    if (n === 3) {
      this.fragments = []
      this.phase = 'round3NovaDialogue'
      this.dialogue.show([
        { speaker: 'NOVA', text: 'Now the real test begins. I will show each memory for 5 seconds. Watch carefully then place from memory.' },
      ], () => {
        this.round3DialogueDone = true
        this.buildRound3Fragments()
        this.phase = 'play'
      })
      return
    }

    this.phase = 'play'
    this.spawnFragmentsForRound(n)

    if (n === 1) {
      this.dialogue.show([
        { speaker: 'NOVA', text: 'Round 1: Tap each fragment to flip it. Then drag it to its year on the wall.' },
      ])
    } else if (n === 2) {
      this.dialogue.show([
        { speaker: 'NOVA', text: 'Round 2: The years are now shuffled on the wall. Fragments fall faster too. Pay attention!' },
      ])
    }
  }

  spawnFragmentsForRound(n) {
    const showFaceUp = false
    this.fragments = this.eras.map((era, i) => {
      let x, y, vx, vy
      if (n === 2) {
        x = 240 + i * ((CONFIG.W - 480) / (this.eras.length - 1)) + (Math.random() - 0.5) * 90
        y = -60 - Math.random() * 60 - i * 30
        vx = (Math.random() - 0.5) * 30
        vy = 45 + Math.random() * 20
      } else {
        x = 220 + Math.random() * (CONFIG.W - 440)
        y = 180 + Math.random() * 280
        const vyMag = 15 + Math.random() * 10
        vx = (Math.random() - 0.5) * 30
        vy = (Math.random() < 0.5 ? -1 : 1) * vyMag
      }
      return {
        id: i,
        era,
        x, y, vx, vy,
        rotation: (Math.random() - 0.5) * 0.3,
        rotSpeed: (Math.random() - 0.5) * 0.4,
        scale: 1, targetScale: 1,
        wobbleT: Math.random() * Math.PI * 2,
        flipped: showFaceUp,
        flipAnim: showFaceUp ? 1 : 0,
        flipping: false,
        memoryTimer: 0,
        memoryDuration: 0,
        held: false, placed: false,
        dragOX: 0, dragOY: 0,
      }
    })
  }

  buildRound3Fragments() {
    const memoryDuration = 5.0
    const showFaceUp = true
    this.fragments = this.eras.map((era, i) => {
      const x = 240 + Math.random() * (CONFIG.W - 480)
      const y = 200 + Math.random() * 240
      const vx = (Math.random() - 0.5) * 15
      const vy = (Math.random() - 0.5) * 12
      return {
        id: i,
        era,
        x, y, vx, vy,
        rotation: (Math.random() - 0.5) * 0.3,
        rotSpeed: (Math.random() - 0.5) * 0.4,
        scale: 1, targetScale: 1,
        wobbleT: Math.random() * Math.PI * 2,
        flipped: showFaceUp,
        flipAnim: showFaceUp ? 1 : 0,
        flipping: false,
        memoryTimer: memoryDuration,
        memoryDuration,
        held: false, placed: false,
        dragOX: 0, dragOY: 0,
      }
    })
  }

  update(dt) {
    this.time += dt
    this.bg.update(dt)
    this.nova.update(dt)
    this.hud.update(dt)
    this.dialogue.update(dt)
    this.transition.update(dt)

    if (this.missionCard.isVisible()) { this.missionCard.update(dt); return }
    if (this.roundBanner.isVisible()) { this.roundBanner.update(dt); return }

    if (pointer.justDown && this.hud.hitMuteBtn(pointer.x, pointer.y)) {
      this.hud.setMuted(Audio.toggle()); return
    }

    if (pointer.justDown && this.dialogue.isVisible()) {
      this.dialogue.advance(); return
    }

    if (this.phase === 'round3NovaDialogue') return

    if (this.phase !== 'play') return

    this.nova.moveTo(120, 540)

    // Slot anims
    for (const s of this.slots) {
      if (s.wrongFlash > 0) s.wrongFlash -= dt
      if (s.filled && s.correctAnim < 1) s.correctAnim = Math.min(1, s.correctAnim + dt * 3)
    }

    // Memory-mode auto-flip (Round 3 only after NOVA intro dismissed)
    if (this.round === 3 && this.round3DialogueDone) {
      for (const f of this.fragments) {
        if (f.placed) continue
        if (f.memoryTimer > 0) {
          f.memoryTimer -= dt
          if (f.memoryTimer <= 0 && f.flipped && !f.flipping) {
            f.flipping = true
            f.flipAnim = 0
            f.flipped = false
            Audio.play('flip', 0.4)
          }
        }
      }
    }

    // Fragment physics
    for (const f of this.fragments) {
      if (f.placed) continue
      f.wobbleT += dt * 1.5
      f.scale += (f.targetScale - f.scale) * dt * 8

      if (f.flipping) {
        f.flipAnim += dt / 0.25
        if (f.flipAnim >= 1) {
          f.flipAnim = 1
          f.flipping = false
        }
      }

      if (f.held) {
        f.x += (pointer.x - f.dragOX - f.x) * dt * 14
        f.y += (pointer.y - f.dragOY - f.y) * dt * 14
        f.rotation *= 0.9
      } else {
        f.x += f.vx * dt
        f.y += f.vy * dt
        // R2 fragments need to fall in without immediate decay — preserve speed until settled
        if (this.round === 2 && f.y < 160) {
          f.vx *= 0.998; f.vy *= 0.998
        } else {
          f.vx *= 0.985; f.vy *= 0.985
        }
        f.rotation += f.rotSpeed * dt
        const margin = 120
        if (f.x < margin) { f.x = margin; f.vx = Math.abs(f.vx) }
        if (f.x > CONFIG.W - margin) { f.x = CONFIG.W - margin; f.vx = -Math.abs(f.vx) }
        // Only bounce off top once fragment is on-screen and moving up — allows R2 fall-in
        if (f.y < 160 && f.vy < 0) { f.y = 160; f.vy = Math.abs(f.vy) }
        if (f.y > CONFIG.H - 360) { f.y = CONFIG.H - 360; f.vy = -Math.abs(f.vy) }
      }
    }

    // Input
    if (pointer.justDown && !this.heldFragment) {
      for (const f of this.fragments) {
        if (f.placed || f.flipping) continue
        if (circleHit(f.x, f.y, 100, pointer.x, pointer.y)) {
          if (!f.flipped) {
            if (this.round === 3) {
              // Memory mode — drag the face-down fragment directly
              f.held = true; f.targetScale = 1.2
              f.dragOX = pointer.x - f.x
              f.dragOY = pointer.y - f.y
              this.heldFragment = f
              Audio.play('whoosh')
            } else {
              // Flip face-up
              f.flipping = true; f.flipAnim = 0; f.flipped = true
              Audio.play('flip')
              Particles.spawn(f.x, f.y, 10, [f.era.color], { speed: 100, size: 5, life: 0.45 })
            }
          } else {
            f.held = true; f.targetScale = 1.2
            f.dragOX = pointer.x - f.x
            f.dragOY = pointer.y - f.y
            this.heldFragment = f
            Audio.play('whoosh')
          }
          break
        }
      }
    }

    if (pointer.justUp && this.heldFragment) {
      const f = this.heldFragment
      f.held = false; f.targetScale = 1
      this.heldFragment = null

      let placed = false
      for (const s of this.slots) {
        if (s.filled) continue
        if (rectHit(s.x, s.y, s.w, s.h, f.x, f.y)) {
          if (f.era === s.era) {
            // CORRECT
            s.filled = true; f.placed = true
            f.x = s.x + s.w / 2; f.y = s.y + s.h / 2
            f.rotation = 0; f.targetScale = 0.85
            this.placedCount++
            const xp = 100
            this.roundXP += xp
            this.totalXP += xp
            Audio.play('correct')
            vibrateCorrect()
            Particles.correct(f.x, f.y)
            Particles.burst(f.x, f.y, [f.era.color])
            s.correctAnim = 0
            const crack = this.cracks.find(c => !c.healing)
            if (crack) crack.healing = true
            const power = 0.15 + ((this.round - 1) * 5 + this.placedCount) / 15 * 0.35
            this.nova.setPower(power)
            this.hud.setNovaPower(power)
            this.nova.bounce()
            this.hud.addXP(xp)
            this.dialogue.show([{ speaker: 'NOVA', text: f.era.fact }])

            if (this.placedCount >= 5) {
              setTimeout(() => this.finishRound(), 1200)
            }
          } else {
            s.wrongFlash = 0.6
            f.vx = (Math.random() - 0.5) * 200
            f.vy = -150
            Audio.play('wrong')
            vibrateWrong()
            Particles.wrong(f.x, f.y)
            this.nova.shake()
            this.hud.showMessage('WRONG YEAR — TRY AGAIN', FAIL_PAUSE_MIN, '#ff6b6b')
          }
          placed = true; break
        }
      }
      if (!placed) {
        f.vx = (Math.random() - 0.5) * 80
        f.vy = -80
      }
    }
  }

  finishRound() {
    if (this.dialogue.isVisible()) this.dialogue.hide()
    if (this.round < this.totalRounds) {
      this.phase = 'banner'
      this.roundBanner.show(this.round, this.roundXP, () => {
        this.startRound(this.round + 1)
      })
    } else {
      this.complete()
    }
  }

  complete() {
    this.phase = 'finalDialogue'
    Audio.play('victory')
    this.nova.setExpression('excited')
    this.nova.setPower(0.55)
    this.hud.setNovaPower(0.55)
    Particles.confetti(CONFIG.W / 2, CONFIG.H / 2)

    this.dialogue.show([
      { speaker: 'NOVA', text: 'All three rounds cleared! You pieced together milestones from Turing and the birth of AI to neural nets, Watson, AlphaGo, GPT-3, and the ChatGPT era.' },
      { speaker: 'NOVA', text: 'And in Round 3 you remembered every year from a flicker. That is real learning.' },
      { speaker: 'NOVA', text: 'Remember: AI history is not over. YOU are the next chapter.' },
    ], () => {
      this.transition.trigger(0.8, () => {
        if (!embeddedLessonDone()) currentScene = new MenuScene()
      })
    })
  }

  render(ctx) {
    const W = CONFIG.W, H = CONFIG.H
    this.bg.render(ctx)
    ctx.save()
    const safePad = 60
    ctx.beginPath()
    ctx.rect(safePad, safePad, W - 2 * safePad, H - 2 * safePad)
    ctx.clip()
    ctx.textBaseline = 'middle'

    // Wall base
    const wallY = H - 300
    ctx.fillStyle = 'rgba(10, 8, 32, 0.85)'
    ctx.fillRect(0, wallY - 20, W, 320)
    ctx.strokeStyle = 'rgba(162,155,254,0.25)'
    ctx.lineWidth = 2
    ctx.beginPath(); ctx.moveTo(0, wallY - 20); ctx.lineTo(W, wallY - 20); ctx.stroke()

    // Cracks
    for (const c of this.cracks) {
      if (c.healing) continue
      ctx.save()
      ctx.translate(c.x, c.y)
      ctx.rotate(c.angle)
      ctx.strokeStyle = 'rgba(255,100,100,0.3)'
      ctx.lineWidth = 1.5
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(c.len, 0); ctx.stroke()
      ctx.restore()
    }

    // Slots
    for (const s of this.slots) {
      const glowA = 0.35 + Math.sin(this.time * PULSE_SLOW * 0.5) * 0.15
      ctx.fillStyle = s.filled ? s.era.color + '22' : 'rgba(255,255,255,0.04)'
      drawRoundRect(ctx, s.x, s.y, s.w, s.h, 12)
      ctx.fill()
      ctx.strokeStyle = s.filled ? s.era.color : `rgba(255,255,255,${glowA})`
      ctx.lineWidth = s.filled ? 3 : 1.5
      drawRoundRect(ctx, s.x, s.y, s.w, s.h, 12)
      ctx.stroke()

      if (s.wrongFlash > 0) {
        ctx.fillStyle = '#ff4444'
        ctx.globalAlpha = s.wrongFlash * 0.35
        drawRoundRect(ctx, s.x, s.y, s.w, s.h, 12)
        ctx.fill()
        ctx.globalAlpha = 1
      }

      ctx.font = `900 56px ${CONFIG.FONT_MAIN}`
      prepTextRender(ctx)
      ctx.fillStyle = s.filled ? s.era.color : 'rgba(255,255,255,0.42)'
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      const sc = s.filled ? 1 + (1 - s.correctAnim) * 0.2 : 1
      ctx.save()
      ctx.translate(s.x + s.w/2, s.y + s.h/2 - 14)
      ctx.scale(sc, sc)
      ctx.fillText(s.era.year, 0, 0)
      doneTextRender(ctx)
      ctx.restore()

      ctx.font = `600 16px ${CONFIG.FONT_BODY}`
      prepTextRender(ctx)
      ctx.fillStyle = s.filled ? s.era.color : 'rgba(255,255,255,0.3)'
      ctx.fillText(s.era.label, s.x + s.w/2, s.y + s.h/2 + 26)
      doneTextRender(ctx)

      if (s.filled) {
        ctx.font = '22px sans-serif'
        ctx.fillText('✓', s.x + s.w - 16, s.y + 28)
      }
    }

    // Fragments (200x110)
    for (const f of this.fragments) {
      if (f.placed) continue
      const fw = 200, fh = 110
      const wobble = Math.sin(f.wobbleT) * (f.held ? 0 : 5)

      ctx.save()
      ctx.translate(f.x, f.y + wobble)
      // straighten when held
      const rot = f.held ? f.rotation * 0.2 : f.rotation
      ctx.rotate(rot)
      ctx.scale(f.scale, f.scale)

      if (f.flipping) {
        const scaleX = Math.abs(Math.cos(f.flipAnim * Math.PI))
        ctx.scale(scaleX, 1)
      }

      // Card shell (no shadow blur — crisp stroke)
      ctx.fillStyle = 'rgba(5, 5, 22, 0.97)'
      ctx.strokeStyle = f.era.color
      ctx.lineWidth = f.held ? 3 : 2
      drawRoundRect(ctx, -fw/2, -fh/2, fw, fh, 14)
      ctx.fill()
      ctx.stroke()

      // During flip: first half shows the OLD side, second half shows the TARGET (f.flipped)
      const showTarget = !f.flipping || f.flipAnim > 0.5
      const showAsUp = showTarget ? f.flipped : !f.flipped

      if (showAsUp) {
        // Face up — year 900 56px Orbitron, label 600 16px Inter
        const colorPulse = 0.7 + Math.sin(this.time * PULSE_SLOW + f.id) * 0.3
        ctx.font = `900 56px ${CONFIG.FONT_MAIN}`
        ctx.fillStyle = f.era.color
        ctx.globalAlpha = colorPulse
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        prepTextRender(ctx)
        ctx.fillText(f.era.year, 0, -14)
        doneTextRender(ctx)
        ctx.globalAlpha = 1
        ctx.font = `600 16px ${CONFIG.FONT_BODY}`
        prepTextRender(ctx)
        ctx.fillStyle = '#ffffff'
        ctx.globalAlpha = 0.85
        ctx.fillText(f.era.label, 0, 28)
        ctx.globalAlpha = 1
        doneTextRender(ctx)

        // Round-3 memory-preview timer ring on each card
        if (this.round === 3 && f.memoryTimer > 0 && f.memoryDuration > 0) {
          const tProg = f.memoryTimer / f.memoryDuration
          const rcx = 72, rcy = -28, rcr = 14
          ctx.beginPath()
          ctx.arc(rcx, rcy, rcr, 0, Math.PI * 2)
          ctx.strokeStyle = 'rgba(255,255,255,0.18)'
          ctx.lineWidth = 3
          ctx.stroke()
          ctx.beginPath()
          ctx.arc(rcx, rcy, rcr, -Math.PI/2, -Math.PI/2 + tProg * Math.PI * 2)
          ctx.strokeStyle = tProg < 0.3 ? '#ff6b6b' : '#ffd700'
          ctx.lineWidth = 3
          ctx.lineCap = 'round'
          ctx.stroke()
          ctx.lineCap = 'butt'
          ctx.font = `700 13px ${CONFIG.FONT_MAIN}`
          prepTextRender(ctx)
          ctx.fillStyle = tProg < 0.3 ? '#ff6b6b' : '#ffd700'
          ctx.textAlign = 'center'
          ctx.textBaseline = 'middle'
          ctx.fillText(Math.ceil(f.memoryTimer).toString(), rcx, rcy)
          doneTextRender(ctx)
        }
      } else {
        // Face down — procedural circuit pattern
        const t = this.time + f.id * 0.5
        const pulse = 0.4 + Math.sin(t * PULSE_SLOW * 0.5) * 0.3

        ctx.strokeStyle = f.era.color
        ctx.globalAlpha = pulse * 0.6
        ctx.lineWidth = 1.5

        // 4 lines crossing
        const w2 = fw/2 - 18, h2 = fh/2 - 14
        const lines = [
          [-w2, -h2, w2, 0],
          [w2, -h2, -w2, 0],
          [-w2, h2, w2, 0],
          [w2, h2, -w2, 0],
        ]
        for (const [x1, y1, x2, y2] of lines) {
          ctx.beginPath()
          ctx.moveTo(x1, y1); ctx.lineTo(x2, y2)
          ctx.stroke()
        }
        // Center node
        ctx.fillStyle = f.era.color
        ctx.globalAlpha = pulse
        ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill()
        // Corner dots
        for (const [x, y] of [[-w2,-h2],[w2,-h2],[-w2,h2],[w2,h2]]) {
          ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill()
        }
        ctx.globalAlpha = 1

        // Tap hint (only round 1/2, not memory test once revealed)
        if (this.round !== 3 || f.memoryTimer === 0) {
          ctx.font = `600 12px ${CONFIG.FONT_BODY}`
          prepTextRender(ctx)
          ctx.fillStyle = 'rgba(255,255,255,0.5)'
          ctx.textAlign = 'center'
          ctx.textBaseline = 'middle'
          ctx.fillText(this.round === 3 ? 'REMEMBER ME' : 'TAP TO REVEAL', 0, h2 - 6)
          doneTextRender(ctx)
        }
      }

      ctx.restore()
    }

    this.nova.render(ctx)
    this.hud.render(ctx)

    if (this.dialogue.isVisible()) {
      this.dialogue.setPosition(this.nova.y > CONFIG.H * 0.5 ? 'top' : 'bottom')
      this.dialogue.render(ctx)
    }

    // Progress
    if (this.phase === 'play') {
      ctx.font = `600 16px ${CONFIG.FONT_MAIN}`
      ctx.fillStyle = '#00e5ff'
      ctx.globalAlpha = 0.85
      ctx.textAlign = 'right'
      ctx.textBaseline = 'middle'
      ctx.fillText(`${this.placedCount}/5 MEMORIES RESTORED`, W - 28, 150)
      ctx.globalAlpha = 1
    }

    this.transition.render(ctx)
    this.missionCard.render(ctx)
    this.roundBanner.render(ctx)
    ctx.restore()
  }
}

// ============================================================
// LESSON 3 — THE VERSUS MACHINE — 3 ROUNDS
// ============================================================
class Lesson3Scene {
  constructor() {
    this.time = 0
    this.bg = new Background('lesson3')
    this.nova = new Nova(120, 540, 0.25)
    this.hud = new HUD()
    this.dialogue = new DialogueBox()
    this.transition = new Transition()
    this.missionCard = new MissionCard()
    this.roundBanner = new RoundBanner()
    this.phase = 'mission'
    this.dialogueBlocksCards = false

    this.hud.setWorld('THE VERSUS MACHINE')
    this.hud.setObjective('SWIPE LEFT FOR AI · SWIPE RIGHT FOR HUMAN')
    this.hud.setNovaPower(0.25)

    this.round = 0
    this.totalRounds = 3
    this.roundXP = 0
    this.totalXP = 0
    this.totalCorrect = 0
    this.streak = 0

    this.taskQueue = []
    this.currentTask = null
    this.taskX = 0
    this.taskY = 0
    this.taskBaseY = CONFIG.H * 0.40
    this.taskFallSpeed = 0
    this.taskDragging = false
    this.taskDragOX = 0
    this.taskVX = 0
    this.failMsg = ''
    this.failTimer = 0
    this.failDuration = FAIL_PAUSE_MIN
    this.lives = 3
    this.maxLives = 3
    this.swipeThreshold = 220

    this.countdownT = 0
    this.countdownDuration = 2.0

    this.missionCard.show(
      'THE VERSUS MACHINE',
      "A great debate is happening. Can AI do everything humans can? Or do humans still have the edge? The Versus Machine needs a judge.",
      'SWIPE each task LEFT for AI or RIGHT for HUMAN before it falls. Wrong choice = see exactly why it fails. 3 lives. 10 tasks.',
      () => { this.startRound(1) }
    )
  }

  startRound(n) {
    this.round = n
    this.roundXP = 0
    this.streak = 0
    this.hud.setRound(n, this.totalRounds)
    this.currentTask = null
    this.failTimer = 0

    if (n === 1) {
      this.taskFallSpeed = 40
      this.maxLives = 3
    } else if (n === 2) {
      this.taskFallSpeed = 95
      this.maxLives = 3
    } else {
      this.taskFallSpeed = 180
      this.maxLives = 5
    }
    this.lives = this.maxLives
    this.failDuration = FAIL_PAUSE_MIN

    let pool
    if (n === 1) pool = VERSUS_TASKS_R1.map(t => ({ ...t }))
    else if (n === 2) pool = VERSUS_TASKS_R2.map(t => ({ ...t }))
    else pool = [...VERSUS_TASKS_R1, ...VERSUS_TASKS_R2].map(t => ({ ...t })).sort(() => Math.random() - 0.5)
    this.taskQueue = pool

    this.phase = 'countdown'
    this.countdownT = this.countdownDuration
  }

  spawnTask() {
    if (this.taskQueue.length === 0) {
      this.finishRound()
      return
    }
    this.currentTask = this.taskQueue.shift()
    this.taskX = CONFIG.W / 2
    this.taskY = this.taskBaseY - 200 // start above
    this.taskDragging = false
    this.taskVX = 0
  }

  update(dt) {
    this.time += dt
    this.bg.update(dt)
    this.nova.update(dt)
    this.hud.update(dt)
    this.dialogue.update(dt)
    this.transition.update(dt)

    if (this.missionCard.isVisible()) { this.missionCard.update(dt); return }
    if (this.roundBanner.isVisible()) { this.roundBanner.update(dt); return }

    if (pointer.justDown && this.hud.hitMuteBtn(pointer.x, pointer.y)) {
      this.hud.setMuted(Audio.toggle()); return
    }

    if (pointer.justDown && this.dialogue.isVisible()) {
      this.dialogue.advance(); return
    }

    if (this.phase === 'interRound') return

    // GET READY countdown — must complete before any cards appear
    if (this.phase === 'countdown') {
      this.countdownT -= dt
      if (this.countdownT <= 0) {
        this.phase = 'play'
        this.spawnTask()
      }
      return
    }

    if (this.phase !== 'play' || !this.currentTask || this.dialogueBlocksCards) return

    this.nova.moveTo(120, 540)

    if (this.failTimer > 0) {
      this.failTimer -= dt
      return
    }

    // Card falls
    if (!this.taskDragging) {
      this.taskY += this.taskFallSpeed * dt
      // Drift back to horizontal center if not being held
      this.taskX += (CONFIG.W / 2 - this.taskX) * dt * 6

      // Missed (off-bottom)
      if (this.taskY > CONFIG.H - 80) {
        this.handleMiss()
        return
      }
    }

    const tw = 480, th = 220

    if (pointer.justDown) {
      if (rectHit(this.taskX - tw/2, this.taskY - th/2, tw, th, pointer.x, pointer.y)) {
        this.taskDragging = true
        this.taskDragOX = pointer.x - this.taskX
      }
    }

    if (pointer.down && this.taskDragging) {
      const prevX = this.taskX
      this.taskX = pointer.x - this.taskDragOX
      this.taskVX = (this.taskX - prevX) / dt
    }

    if (pointer.justUp && this.taskDragging) {
      this.taskDragging = false
      const offset = this.taskX - CONFIG.W / 2
      if (Math.abs(offset) > this.swipeThreshold || Math.abs(this.taskVX) > 400) {
        const swipedLeft = offset < 0 || this.taskVX < -400
        const answer = swipedLeft ? 'AI' : 'HUMAN'
        this.resolveTask(answer)
      } else {
        this.taskVX = 0
      }
    }
  }

  handleMiss() {
    this.lives--
    Audio.play('wrong')
    vibrateWrong()
    Particles.wrong(this.taskX, this.taskY)
    this.nova.shake()
    this.streak = 0
    this.failMsg = 'TIME UP! Task fell through.'
    this.failTimer = this.failDuration
    this.hud.showMessage('MISSED — LIFE LOST', FAIL_PAUSE_MIN, '#ff6b6b')
    this.currentTask = null

    if (this.lives <= 0) {
      this.gameOver()
      return
    }
    setTimeout(() => this.spawnTask(), Math.max(300, this.failDuration * 1000 + 200))
  }

  resolveTask(answer) {
    const task = this.currentTask
    const correct = answer === task.answer

    if (correct) {
      this.streak++
      let mult = 1
      if (this.round === 3) {
        if (this.streak >= 4) mult = 4
        else if (this.streak === 3) mult = 3
        else if (this.streak === 2) mult = 2
      }
      const xp = 75 * mult
      this.roundXP += xp
      this.totalXP += xp
      this.totalCorrect++
      Audio.play('correct')
      vibrateCorrect()
      Particles.correct(this.taskX, this.taskY)
      this.nova.bounce()
      this.hud.addXP(xp)
      const power = 0.25 + Math.min(0.5, this.totalCorrect / 30 * 0.5)
      this.nova.setPower(power)
      this.hud.setNovaPower(power)
      if (this.round === 3 && mult > 1) this.hud.showMessage(`STREAK x${mult}!`, FAIL_PAUSE_MIN, '#ffd700')
      this.currentTask = null
      setTimeout(() => this.spawnTask(), 500)
    } else {
      this.streak = 0
      this.lives--
      Audio.play('wrong')
      vibrateWrong()
      Particles.wrong(this.taskX, this.taskY)
      this.nova.shake()
      const failMsg = answer === 'AI' ? task.failAI : task.failHuman
      this.failMsg = failMsg || 'Not quite right!'
      this.failTimer = this.failDuration
      this.hud.showMessage(this.failMsg, this.failDuration, '#ff6b6b')

      if (this.lives <= 0) {
        this.gameOver()
        return
      }
      setTimeout(() => this.spawnTask(), Math.max(300, this.failDuration * 1000 + 200))
      this.currentTask = null
    }
  }

  gameOver() {
    this.phase = 'over'
    this.dialogue.show([
      { speaker: 'NOVA', text: 'No lives left! But every mistake teaches us something. Try again!' }
    ], () => { currentScene = new MenuScene() })
  }

  finishRound() {
    if (this.dialogue.isVisible()) this.dialogue.hide()
    if (this.round < this.totalRounds) {
      this.phase = 'banner'
      this.roundBanner.show(this.round, this.roundXP, () => {
        this.phase = 'interRound'
        this.dialogueBlocksCards = true
        const lines = this.round === 1
          ? [{ speaker: 'NOVA', text: 'Round 1 complete! Round 2 brings five brand-new tasks — medium difficulty. Get ready!' }]
          : [{ speaker: 'NOVA', text: 'Round 2 complete! Round 3 is the SPEED ROUND — all ten tasks combined. Build streaks for bonus XP!' }]
        this.dialogue.show(lines, () => {
          this.dialogueBlocksCards = false
          this.startRound(this.round + 1)
        })
      })
    } else {
      this.complete()
    }
  }

  complete() {
    this.phase = 'finalDialogue'
    Audio.play('victory')
    this.nova.setExpression('excited')
    this.nova.setPower(0.7)
    this.hud.setNovaPower(0.7)
    Particles.confetti(CONFIG.W/2, CONFIG.H/2)
    this.dialogue.show([
      { speaker: 'NOVA', text: `Three rounds done! You sorted ${this.totalCorrect} tasks correctly.` },
      { speaker: 'NOVA', text: 'The truth is: AI wins at speed, memory, and data. Humans win at empathy, creativity, and understanding.' },
      { speaker: 'NOVA', text: 'The future is not AI versus humans. It is AI PLUS humans. That is where you come in.' },
    ], () => { this.transition.trigger(0.8, () => { if (!embeddedLessonDone()) currentScene = new MenuScene() }) })
  }

  render(ctx) {
    const W = CONFIG.W, H = CONFIG.H
    this.bg.render(ctx)
    ctx.save()
    ctx.textBaseline = 'middle'

    // Vertical zone dividers
    ctx.strokeStyle = 'rgba(0,229,255,0.3)'
    ctx.lineWidth = 2
    ctx.beginPath(); ctx.moveTo(W * 0.3, 100); ctx.lineTo(W * 0.3, H); ctx.stroke()
    ctx.strokeStyle = 'rgba(255,215,0,0.3)'
    ctx.beginPath(); ctx.moveTo(W * 0.7, 100); ctx.lineTo(W * 0.7, H); ctx.stroke()

    // Lives
    ctx.font = '34px sans-serif'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    for (let i = 0; i < this.maxLives; i++) {
      ctx.globalAlpha = i < this.lives ? 1 : 0.2
      ctx.fillText('❤️', W/2 - (this.maxLives - 1) * 22 + i * 44, 156)
    }
    ctx.globalAlpha = 1

    // Zone mascots (top of zones — before labels)
    const imgS = 100
    if (gameSprites.robot.complete && gameSprites.robot.naturalWidth > 0) {
      ctx.drawImage(gameSprites.robot, 260, H * 0.25, imgS, imgS)
    }
    if (gameSprites.human.complete && gameSprites.human.naturalWidth > 0) {
      ctx.drawImage(gameSprites.human, CONFIG.W - 260 - imgS, H * 0.25, imgS, imgS)
    }

    // Funnel labels at bottom of zones (y = 0.75 H)
    const labelY = H * 0.75
    const hintY = labelY + 42
    ctx.font = `900 56px ${CONFIG.FONT_MAIN}`
    prepTextRender(ctx)
    ctx.fillStyle = '#00e5ff'
    ctx.globalAlpha = 0.55
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    ctx.fillText('AI', W * 0.15, labelY)
    ctx.font = `600 18px ${CONFIG.FONT_BODY}`
    ctx.fillText('← SWIPE LEFT', W * 0.15, hintY)
    doneTextRender(ctx)

    ctx.font = `900 56px ${CONFIG.FONT_MAIN}`
    prepTextRender(ctx)
    ctx.fillStyle = '#ffd700'
    ctx.fillText('HUMAN', W * 0.85, labelY)
    ctx.font = `600 18px ${CONFIG.FONT_BODY}`
    ctx.fillText('SWIPE RIGHT →', W * 0.85, hintY)
    doneTextRender(ctx)
    ctx.globalAlpha = 1

    // Card — only when actively playing and not blocked by between-round dialogue
    if (this.phase === 'play' && this.currentTask && this.failTimer <= 0 && !this.dialogueBlocksCards) {
      const task = this.currentTask
      const tw = 480, th = 220
      const tx = this.taskX, ty = this.taskY
      const tilt = (tx - W/2) / W * 0.3

      ctx.save()
      ctx.translate(tx, ty)
      ctx.rotate(tilt)

      // Background gradient on card
      const cardCol = tx < W/2 - 20 ? '#00e5ff' : (tx > W/2 + 20 ? '#ffd700' : '#00e5ff')
      const g = ctx.createLinearGradient(-tw/2, -th/2, tw/2, th/2)
      g.addColorStop(0, 'rgba(10, 8, 30, 0.97)')
      g.addColorStop(1, `${cardCol}22`)
      ctx.fillStyle = g
      drawRoundRect(ctx, -tw/2, -th/2, tw, th, 18)
      ctx.fill()

      ctx.strokeStyle = cardCol
      ctx.lineWidth = 2.5
      drawRoundRect(ctx, -tw/2, -th/2, tw, th, 18)
      ctx.stroke()
      // Thick color bar on left
      ctx.fillStyle = cardCol
      ctx.fillRect(-tw/2, -th/2, 12, th)

      // Emoji
      ctx.font = '64px sans-serif'
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.fillText(task.emoji, 0, -50)

      // Text — 700  Inter
      ctx.font = `700 26px ${CONFIG.FONT_BODY}`
      prepTextRender(ctx)
      ctx.fillStyle = '#f1f5f9'
      const rows = wrapText(ctx, task.text, 400)
      let ry = rows.length > 1 ? 22 : 36
      for (const r of rows) { ctx.fillText(r, 0, ry); ry += 36 }
      doneTextRender(ctx)

      const swipeOffset = Math.abs(tx - W/2)
      if (swipeOffset > 90) {
        ctx.globalAlpha = Math.min(1, (swipeOffset - 90) / 130)
        ctx.font = `900 28px ${CONFIG.FONT_MAIN}`
        ctx.fillStyle = cardCol
        ctx.fillText(tx < W/2 ? '← AI' : 'HUMAN →', 0, 86)
        ctx.globalAlpha = 1
      }

      ctx.restore()
    }

    // Streak indicator (round 3)
    if (this.round === 3 && this.streak >= 2) {
      const mult = Math.min(4, this.streak)
      ctx.font = `900 40px ${CONFIG.FONT_MAIN}`
      prepTextRender(ctx)
      ctx.fillStyle = '#ffd700'
      ctx.globalAlpha = 0.85 + Math.sin(this.time * PULSE_SLOW) * 0.15
      ctx.textAlign = 'center'
      ctx.fillText(`STREAK x${mult}`, W/2, 220)
      doneTextRender(ctx)
      ctx.globalAlpha = 1
    }

    // GET READY countdown overlay
    if (this.phase === 'countdown') {
      const remain = Math.max(0, this.countdownT)
      const a = Math.min(1, (this.countdownDuration - remain) * 3, remain * 3)
      ctx.save()
      ctx.globalAlpha = a
      ctx.fillStyle = 'rgba(0, 0, 8, 0.55)'
      ctx.fillRect(0, 0, W, H)
      ctx.globalAlpha = 1

      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.font = `900 72px ${CONFIG.FONT_MAIN}`
      prepTextRender(ctx)
      ctx.fillStyle = '#00e5ff'
      ctx.fillText('GET READY', W/2, H/2 - 60)
      doneTextRender(ctx)

      const num = Math.max(1, Math.ceil(remain))
      const scale = 1 + (1 - (remain - Math.floor(remain))) * 0.4
      ctx.save()
      ctx.translate(W/2, H/2 + 50)
      ctx.scale(scale, scale)
      ctx.font = `900 120px ${CONFIG.FONT_MAIN}`
      prepTextRender(ctx)
      ctx.fillStyle = '#ffd700'
      ctx.fillText(num.toString(), 0, 0)
      ctx.restore()
      doneTextRender(ctx)
      ctx.restore()
    }

    // Fail message
    if (this.failTimer > 0) {
      const a = Math.min(1, this.failTimer / 0.3)
      ctx.save()
      ctx.globalAlpha = a
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.font = `700 24px ${CONFIG.FONT_BODY}`
      const mw = Math.min(ctx.measureText(this.failMsg).width + 80, W - 100)
      ctx.fillStyle = 'rgba(0,0,0,0.92)'
      ctx.fillRect(W/2 - mw/2, H/2 - 50, mw, 100)
      ctx.strokeStyle = '#ff6b6b'
      ctx.lineWidth = 2.5
      ctx.strokeRect(W/2 - mw/2, H/2 - 50, mw, 100)
      prepTextRender(ctx)
      ctx.fillStyle = '#ff6b6b'
      ctx.fillText(this.failMsg, W/2, H/2)
      doneTextRender(ctx)
      ctx.restore()
    }

    // Score
    ctx.font = `600 17px ${CONFIG.FONT_MAIN}`
    ctx.fillStyle = '#00e5ff'
    ctx.globalAlpha = 0.85
    ctx.textAlign = 'right'
    ctx.textBaseline = 'middle'
    ctx.fillText(`${this.totalCorrect}/20 TOTAL`, W - 28, 150)
    ctx.globalAlpha = 1

    this.nova.render(ctx)
    this.hud.render(ctx)
    if (this.dialogue.isVisible()) this.dialogue.render(ctx)
    this.transition.render(ctx)
    this.missionCard.render(ctx)
    this.roundBanner.render(ctx)

    ctx.textAlign = 'left'
    ctx.textBaseline = 'alphabetic'
    ctx.restore()
  }
}

// ============================================================
// LESSON 4 — THE THREE DOORS — 3 ROUNDS
// ============================================================
class Lesson4Scene {
  constructor() {
    this.time = 0
    this.bg = new Background('lesson4')
    this.nova = new Nova(120, 540, 0.3)
    this.hud = new HUD()
    this.dialogue = new DialogueBox()
    this.transition = new Transition()
    this.missionCard = new MissionCard()
    this.roundBanner = new RoundBanner()
    this.phase = 'mission'
    this.dialogueBlocksCards = false

    this.hud.setWorld('THE THREE DOORS')
    this.hud.setObjective('READ EACH CARD · DRAG IT TO THE CORRECT DOOR')
    this.hud.setNovaPower(0.3)

    this.generalRejects = [
      'Not invented yet! Scientists are still working!',
      'Nope! General AI does not exist in 2024!',
      'Maybe in your lifetime — but not today!',
      'Still just a dream! Try another door!',
      'Researchers have been trying since 1956!',
    ]
    this.generalRejectIdx = 0

    this.round = 0
    this.totalRounds = 3
    this.roundXP = 0
    this.totalXP = 0
    this.placedCount = 0
    this.totalToPlace = 0
    this.heldCard = null
    this.dragOX = 0; this.dragOY = 0
    this.blastTimer = 0
    this.doors = []
    this.cards = []
    this.mode = 'grid' // 'grid' (R1) | 'sequential' (R2) | 'speed' (R3)

    // Sequential mode (R2)
    this.seqQueue = []

    // Speed-sort mode state (R3)
    this.speedQueue = []
    this.speedCurrent = null
    this.speedTimer = 0
    this.speedLimit = 8.0
    this.speedFailDelay = 0
    this.speedRevealTimer = 0
    this.speedRevealAnswer = ''
    this.speedLives = 5
    this.speedButtons = []
    this.speedAnswered = 0
    this.speedCorrect = 0

    this.missionCard.show(
      'THE THREE DOORS',
      'Three types of AI exist — Narrow, General, and Super. But they have escaped their enclosures and the cards describing them are scattered everywhere.',
      'READ each card carefully. DRAG it to the correct door. Warning: the General AI door has a surprise waiting for you.',
      () => { this.startRound(1) }
    )
  }

  startRound(n) {
    this.round = n
    this.roundXP = 0
    this.placedCount = 0
    this.heldCard = null
    this.hud.setRound(n, this.totalRounds)
    this.phase = 'play'

    // Doors (taller, wider)
    const doorW = 220, doorH = 380
    this.doors = [
      { id: 'NARROW', label: 'NARROW AI', sublabel: 'One task only', color: '#6bcbff', x: CONFIG.W * 0.22, y: CONFIG.H * 0.34, w: doorW, h: doorH, count: 0, maxCount: 0, shakeT: 0, glowT: 0, rejectMsg: '', rejectTimer: 0 },
      { id: 'GENERAL', label: 'GENERAL AI', sublabel: 'Does NOT exist yet', color: '#ffd700', x: CONFIG.W * 0.5, y: CONFIG.H * 0.34, w: doorW, h: doorH, count: 0, maxCount: 0, shakeT: 0, glowT: 0, rejectMsg: '', rejectTimer: 0 },
      { id: 'SUPER', label: 'SUPER AI', sublabel: 'Smarter than all humans', color: '#ff6b6b', x: CONFIG.W * 0.78, y: CONFIG.H * 0.34, w: doorW, h: doorH, count: 0, maxCount: 0, shakeT: 0, glowT: 0, rejectMsg: '', rejectTimer: 0 },
    ]

    if (n === 1) {
      this.mode = 'grid'
      this.setupGridCards(THREE_DOORS_R1.map(c => ({ ...c })))
      this.totalToPlace = this.cards.filter(c => c.answer !== 'GENERAL').length
    } else if (n === 2) {
      this.mode = 'sequential'
      this.seqQueue = THREE_DOORS_R2.map(c => ({ ...c }))
      this.cards = []
      this.totalToPlace = THREE_DOORS_R2.filter(c => c.answer !== 'GENERAL').length
      this.spawnSeqCard()
    } else {
      this.mode = 'speed'
      this.speedQueue = uniqueCardsMerge(THREE_DOORS_R1, THREE_DOORS_R2).sort(() => Math.random() - 0.5)
      this.speedAnswered = 0
      this.speedCorrect = 0
      this.speedLives = 5
      this.speedLimit = 8.0
      this.speedFailDelay = 0
      this.speedRevealTimer = 0
      this.speedRevealAnswer = ''
      this.totalToPlace = 0
      this.spawnSpeedCard()
    }

    // Count expected per door
    let allCardsForRound
    if (n === 1) allCardsForRound = THREE_DOORS_R1
    else if (n === 2) allCardsForRound = THREE_DOORS_R2
    else allCardsForRound = []
    for (const d of this.doors) {
      if (d.id === 'GENERAL') {
        d.maxCount = 0
        d.expectedCount = 0
      } else {
        d.expectedCount = allCardsForRound.filter(c => c.answer === d.id).length
        d.maxCount = d.expectedCount
      }
    }
  }

  setupGridCards(subset) {
    const pad = 60
    const cardW = 280
    const cardH = 110
    const rowGap = 16
    const cols = 4
    const startX = pad + cardW / 2
    this.cards = subset.map(c => ({
      text: c.text, answer: c.answer, emoji: c.emoji,
      held: false, placed: false, x: 0, y: 0, placedDoor: null
    }))
    const totalRows = Math.ceil(this.cards.length / cols)
    const gridTop = CONFIG.H - totalRows * cardH - (totalRows - 1) * rowGap - 60
    this.cards.forEach((c, i) => {
      const col = i % cols
      const row = Math.floor(i / cols)
      c.x = startX + col * (cardW + rowGap)
      c.y = gridTop + row * (cardH + rowGap) + cardH / 2
    })
    this._cardW = cardW
    this._cardH = cardH
    this._gridRowGap = rowGap
  }

  spawnSeqCard() {
    if (this.seqQueue.length === 0) {
      this.finishRound()
      return
    }
    const raw = this.seqQueue.shift()
    this.cards = [{
      text: raw.text, answer: raw.answer, emoji: raw.emoji,
      held: false, placed: false,
      x: CONFIG.W / 2, y: CONFIG.H * 0.86,
      placedDoor: null,
      isSeq: true
    }]
    this._cardW = 480
    this._cardH = 140
  }

  spawnSpeedCard() {
    if (this.speedQueue.length === 0) {
      this.finishRound()
      return
    }
    this.speedCurrent = this.speedQueue.pop()
    this.speedTimer = this.speedLimit
    this.speedFailDelay = 0
    this.speedRevealTimer = 0
    this.speedRevealAnswer = ''
    // Three buttons:  × 
    const bw = Math.round(280)
    const bh = Math.round(100)
    const gap = Math.max(40, Math.round(60))
    const totalW = 3 * bw + 2 * gap
    const sx = (CONFIG.W - totalW) / 2
    const by = CONFIG.H * 0.78
    this.speedButtons = [
      { id: 'NARROW', label: 'NARROW', color: '#6bcbff', x: sx, y: by, w: bw, h: bh, hover: false },
      { id: 'GENERAL', label: 'GENERAL', color: '#ffd700', x: sx + bw + gap, y: by, w: bw, h: bh, hover: false },
      { id: 'SUPER', label: 'SUPER', color: '#ff6b6b', x: sx + (bw + gap) * 2, y: by, w: bw, h: bh, hover: false },
    ]
  }

  resolveSpeed(answer) {
    const card = this.speedCurrent
    this.speedAnswered++
    if (answer === card.answer) {
      this.speedCorrect++
      const xp = 100
      this.roundXP += xp
      this.totalXP += xp
      Audio.play('correct')
      vibrateCorrect()
      Particles.correct(CONFIG.W/2, CONFIG.H/2)
      this.nova.bounce()
      this.hud.addXP(xp)
      const power = Math.min(0.85, 0.3 + this.speedCorrect / 10 * 0.55)
      this.nova.setPower(power)
      this.hud.setNovaPower(power)
      this.speedCurrent = null
      setTimeout(() => this.spawnSpeedCard(), 350)
    } else {
      this.speedLives--
      Audio.play('wrong')
      vibrateWrong()
      Particles.wrong(CONFIG.W/2, CONFIG.H/2)
      this.nova.shake()
      this.speedRevealTimer = 2
      this.speedRevealAnswer = card.answer
    }
  }

  update(dt) {
    this.time += dt
    this.bg.update(dt)
    this.nova.update(dt)
    this.hud.update(dt)
    this.dialogue.update(dt)
    this.transition.update(dt)

    if (this.missionCard.isVisible()) { this.missionCard.update(dt); return }
    if (this.roundBanner.isVisible()) { this.roundBanner.update(dt); return }

    if (pointer.justDown && this.hud.hitMuteBtn(pointer.x, pointer.y)) {
      this.hud.setMuted(Audio.toggle()); return
    }

    if (pointer.justDown && this.dialogue.isVisible()) {
      this.dialogue.advance(); return
    }

    if (this.phase === 'interRound') return

    if (this.phase !== 'play') return

    this.nova.moveTo(120, 540)

    // Update door state
    for (const d of this.doors) {
      if (d.shakeT > 0) d.shakeT -= dt
      if (d.glowT > 0) d.glowT -= dt
      if (d.rejectTimer > 0) d.rejectTimer -= dt
    }

    if (this.blastTimer > 0) this.blastTimer -= dt

    if (this.mode === 'speed') {
      this.updateSpeed(dt)
    } else {
      this.updateDrag(dt)
    }
  }

  updateDrag(dt) {
    const cardHitW = (this._cardW || 320) - 20
    const cardHitH = (this._cardH || 110) + 10

    if (pointer.justDown && !this.heldCard) {
      for (const c of this.cards) {
        if (c.placed) continue
        if (rectHit(c.x - cardHitW/2, c.y - cardHitH/2, cardHitW, cardHitH, pointer.x, pointer.y)) {
          c.held = true
          this.heldCard = c
          this.dragOX = pointer.x - c.x
          this.dragOY = pointer.y - c.y
          Audio.play('click')
          break
        }
      }
    }

    if (pointer.down && this.heldCard) {
      this.heldCard.x = pointer.x - this.dragOX
      this.heldCard.y = pointer.y - this.dragOY
    }

    const isSeq = this.mode === 'sequential'
    const resetCard = (c) => {
      if (isSeq) {
        c.x = CONFIG.W / 2
        c.y = CONFIG.H * 0.86
      } else {
        // Snap back to original grid slot
        const idx = this.cards.indexOf(c)
        const cols = 4
        const col = idx % cols
        const row = Math.floor(idx / cols)
        const cardW = this._cardW
        const cardH = this._cardH
        const rowGap = this._gridRowGap || 16
        const totalRows = Math.ceil(this.cards.length / cols)
        const gridTop = CONFIG.H - totalRows * cardH - (totalRows - 1) * rowGap - 60
        const pad = 60
        const startX = pad + cardW / 2
        c.x = startX + col * (cardW + rowGap)
        c.y = gridTop + row * (cardH + rowGap) + cardH / 2
      }
    }

    if (pointer.justUp && this.heldCard) {
      const c = this.heldCard
      c.held = false
      this.heldCard = null

      let dropped = false
      for (const d of this.doors) {
        const dx = d.x - d.w/2, dy = d.y
        if (rectHit(dx, dy, d.w, d.h, c.x, c.y)) {
          dropped = true

          if (d.id === 'GENERAL') {
            d.shakeT = 0.5
            d.rejectMsg = this.generalRejects[this.generalRejectIdx % this.generalRejects.length]
            d.rejectTimer = 2.5
            this.generalRejectIdx++
            Audio.play('wrong')
            vibrateWrong()
            Particles.wrong(c.x, c.y)
            this.nova.shake()
            if (isSeq) {
              // Sequential cards must always advance — general door is the "learn & move on"
              c.placed = true
              setTimeout(() => this.spawnSeqCard(), 900)
            } else {
              resetCard(c)
            }
          } else if (d.id === c.answer) {
            c.placed = true
            c.placedDoor = d.id
            d.count++
            d.glowT = 1.0
            this.placedCount++
            const xp = 100
            this.roundXP += xp
            this.totalXP += xp
            Audio.play('correct')
            vibrateCorrect()
            Particles.correct(c.x, c.y)
            Particles.burst(d.x, d.y + d.h/2, [d.color])
            this.nova.bounce()
            this.hud.addXP(xp)
            const power = Math.min(0.85, 0.3 + this.placedCount / Math.max(1, this.totalToPlace) * 0.55)
            this.nova.setPower(power)
            this.hud.setNovaPower(power)
            if (d.id === 'SUPER') this.blastTimer = 0.8

            if (isSeq) {
              // Sequential: spawn next or finish
              if (this.placedCount >= this.totalToPlace) {
                setTimeout(() => this.finishRound(), 800)
              } else {
                setTimeout(() => this.spawnSeqCard(), 500)
              }
            } else {
              const placeable = this.cards.filter(cc => cc.answer !== 'GENERAL')
              if (placeable.every(cc => cc.placed)) {
                setTimeout(() => this.finishRound(), 900)
              }
            }
          } else {
            d.shakeT = 0.45
            Audio.play('wrong')
            vibrateWrong()
            Particles.wrong(c.x, c.y)
            this.nova.shake()
            this.hud.showMessage('WRONG DOOR — READ THE CARD AGAIN!', FAIL_PAUSE_MIN, '#ff6b6b')
            resetCard(c)
          }
          break
        }
      }
      if (!dropped) {
        resetCard(c)
      }
    }
  }

  updateSpeed(dt) {
    if (this.speedRevealTimer > 0) {
      this.speedRevealTimer -= dt
      if (this.speedRevealTimer <= 0) {
        this.speedRevealAnswer = ''
        this.speedCurrent = null
        if (this.speedLives <= 0) {
          this.phase = 'over'
          setTimeout(() => { currentScene = new MenuScene() }, 200)
          return
        }
        this.spawnSpeedCard()
      }
      return
    }

    if (this.speedFailDelay > 0) {
      this.speedFailDelay -= dt
      if (this.speedFailDelay <= 0) {
        this.speedCurrent = null
        if (this.speedLives <= 0) {
          this.phase = 'over'
          setTimeout(() => { currentScene = new MenuScene() }, 200)
          return
        }
        this.spawnSpeedCard()
      }
      return
    }

    if (!this.speedCurrent) return

    this.speedTimer -= dt

    for (const b of this.speedButtons) {
      b.hover = rectHit(b.x, b.y, b.w, b.h, pointer.x, pointer.y)
    }

    if (this.speedTimer <= 0) {
      this.speedLives--
      this.hud.showMessage('TIME UP — LIFE LOST', FAIL_PAUSE_MIN, '#ff6b6b')
      Audio.play('wrong')
      vibrateWrong()
      this.nova.shake()
      this.speedFailDelay = 2
      return
    }

    if (pointer.justDown) {
      for (const b of this.speedButtons) {
        if (rectHit(b.x, b.y, b.w, b.h, pointer.x, pointer.y)) {
          Audio.play('click')
          this.resolveSpeed(b.id)
          break
        }
      }
    }
  }

  finishRound() {
    if (this.dialogue.isVisible()) this.dialogue.hide()
    if (this.round < this.totalRounds) {
      this.phase = 'banner'
      this.roundBanner.show(this.round, this.roundXP, () => {
        this.phase = 'interRound'
        this.dialogueBlocksCards = true
        const lines = this.round === 1
          ? [{ speaker: 'NOVA', text: 'Round 1 complete! Round 2 brings eight tougher cards — one at a time. Read each one carefully.' }]
          : [{ speaker: 'NOVA', text: 'Round 2 complete! Round 3 is SPEED SORT — all fifteen unique cards, eight seconds each. Good luck!' }]
        this.dialogue.show(lines, () => {
          this.dialogueBlocksCards = false
          this.startRound(this.round + 1)
        })
      })
    } else {
      this.complete()
    }
  }

  complete() {
    this.phase = 'finalDialogue'
    Audio.play('victory')
    this.nova.setExpression('excited')
    this.nova.setPower(0.85)
    this.hud.setNovaPower(0.85)
    Particles.confetti(CONFIG.W/2, CONFIG.H/2)
    this.dialogue.show([
      { speaker: 'NOVA', text: 'All three rounds cleared! You know the three types of AI inside and out.' },
      { speaker: 'NOVA', text: 'Remember: NARROW AI is what exists today. GENERAL AI and SUPER AI are still in the future. And YOU are learning to build that future right now.' },
    ], () => { this.transition.trigger(0.8, () => { if (!embeddedLessonDone()) currentScene = new MenuScene() }) })
  }

  drawDoor(ctx, d) {
    const dx = d.x - d.w/2, dy = d.y
    const shake = d.shakeT > 0 ? Math.sin(d.shakeT * 45) * 9 : 0
    const archH = 80

    ctx.save()
    ctx.translate(shake, 0)

    // Build door path with arched top
    const path = () => {
      ctx.beginPath()
      ctx.moveTo(dx, dy + d.h)            // bottom-left
      ctx.lineTo(dx, dy + archH)          // up left side
      ctx.quadraticCurveTo(dx, dy, d.x, dy)         // arch up-left
      ctx.quadraticCurveTo(dx + d.w, dy, dx + d.w, dy + archH) // arch up-right
      ctx.lineTo(dx + d.w, dy + d.h)      // down right side
      ctx.closePath()
    }

    // Atmospheric layer clipped to door silhouette (drawn behind panel)
    ctx.save()
    path()
    ctx.clip()
    if (d.id === 'NARROW') {
      const rg = ctx.createRadialGradient(d.x, dy + d.h * 0.42, 0, d.x, dy + d.h * 0.42, 200)
      rg.addColorStop(0, 'rgba(107, 203, 255, 0.12)')
      rg.addColorStop(1, 'rgba(0,0,0,0)')
      ctx.fillStyle = rg
      ctx.fillRect(dx - 40, dy - 40, d.w + 80, d.h + 80)
    } else if (d.id === 'GENERAL') {
      for (let i = 0; i < 5; i++) {
        const ox = Math.sin(this.time * 0.8 + i * 1.7) * (d.w * 0.32)
        const oy = Math.cos(this.time * 0.65 + i * 1.4) * (d.h * 0.22)
        ctx.fillStyle = 'rgba(255, 215, 0, 0.3)'
        ctx.beginPath()
        ctx.arc(d.x + ox, dy + d.h * 0.38 + oy, 4, 0, Math.PI * 2)
        ctx.fill()
      }
    } else if (d.id === 'SUPER') {
      for (let i = 0; i < 3; i++) {
        const r = (18 + (this.time * 40 + i * 55) % 140)
        ctx.strokeStyle = `rgba(255, 107, 107, ${0.08 * (1 - r / 140)})`
        ctx.lineWidth = 2
        ctx.beginPath()
        ctx.arc(d.x, dy + d.h * 0.48, r, 0, Math.PI * 2)
        ctx.stroke()
      }
    }
    ctx.restore()

    // Door bg fill
    ctx.fillStyle = 'rgba(8, 6, 30, 0.92)'
    path(); ctx.fill()

    // Glow (when recently correct)
    if (d.glowT > 0) {
      ctx.fillStyle = d.color
      ctx.globalAlpha = d.glowT * 0.35
      path(); ctx.fill()
      ctx.globalAlpha = 1
    }

    // Inner ambient glow
    ctx.fillStyle = d.color
    ctx.globalAlpha = 0.07 + Math.sin(this.time * PULSE_SLOW + d.x * 0.01) * 0.04
    path(); ctx.fill()
    ctx.globalAlpha = 1

    // Outline
    ctx.strokeStyle = d.color
    ctx.lineWidth = d.id === 'GENERAL' ? 2 : 3
    ctx.globalAlpha = d.id === 'GENERAL' ? 0.55 : 1
    if (d.id === 'GENERAL') ctx.setLineDash([10, 8])
    path(); ctx.stroke()
    ctx.setLineDash([])
    ctx.globalAlpha = 1

    // Keyhole — circle + rectangle
    const khX = d.x, khY = dy + archH + 90
    ctx.fillStyle = d.color
    ctx.globalAlpha = 0.55
    ctx.beginPath()
    ctx.arc(khX, khY, 11, 0, Math.PI * 2)
    ctx.fill()
    ctx.fillRect(khX - 4, khY, 8, 18)
    ctx.globalAlpha = 1

    // Count badges (only for placeable doors)
    if (d.id !== 'GENERAL' && d.expectedCount > 0) {
      const badgeY = dy + archH + 36
      const badgeStartX = dx + 20
      for (let i = 0; i < d.expectedCount; i++) {
        const bx = badgeStartX + i * 22
        ctx.fillStyle = i < d.count ? d.color : 'rgba(255,255,255,0.13)'
        ctx.beginPath(); ctx.arc(bx + 8, badgeY, 8, 0, Math.PI * 2); ctx.fill()
      }
    }

    // Door mascot (images when loaded)
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    if (d.id === 'NARROW' && gameSprites.robot.complete && gameSprites.robot.naturalWidth > 0) {
      ctx.drawImage(gameSprites.robot, d.x - 40, dy + 160, 80, 80)
    } else if (d.id === 'GENERAL' && gameSprites.brain.complete && gameSprites.brain.naturalWidth > 0) {
      ctx.globalAlpha = 0.5 + Math.sin(this.time * PULSE_SLOW) * 0.2
      ctx.drawImage(gameSprites.brain, d.x - 40, dy + 160, 80, 80)
      ctx.globalAlpha = 1
    } else {
      ctx.font = '56px sans-serif'
      if (d.id === 'NARROW') {
        ctx.fillText('🤖', d.x, dy + 200)
      } else if (d.id === 'GENERAL') {
        ctx.globalAlpha = 0.4 + Math.sin(this.time * PULSE_SLOW) * 0.25
        ctx.fillText('❓', d.x, dy + 200)
        ctx.globalAlpha = 1
      } else {
        ctx.globalAlpha = 0.65 + Math.sin(this.time * PULSE_SLOW) * 0.3
        ctx.fillText('⚡', d.x, dy + 200)
        ctx.globalAlpha = 1
      }
    }

    // Label / sublabel
    ctx.font = `700 24px ${CONFIG.FONT_MAIN}`
    prepTextRender(ctx)
    ctx.fillStyle = d.color
    ctx.globalAlpha = d.id === 'GENERAL' ? 0.75 : 1
    ctx.fillText(d.label, d.x, dy + 290)
    doneTextRender(ctx)
    ctx.font = `500 16px ${CONFIG.FONT_BODY}`
    prepTextRender(ctx)
    ctx.fillStyle = '#a0a8c0'
    ctx.fillText(d.sublabel, d.x, dy + 320)
    doneTextRender(ctx)
    ctx.globalAlpha = 1

    // GENERAL: COMING SOON + floating question marks
    if (d.id === 'GENERAL') {
      ctx.font = `700 16px ${CONFIG.FONT_MAIN}`
      prepTextRender(ctx)
      ctx.fillStyle = '#ffd700'
      ctx.globalAlpha = 0.65 + Math.sin(this.time * PULSE_SLOW) * 0.35
      ctx.fillText('COMING SOON', d.x, dy + 350)
      doneTextRender(ctx)
      ctx.globalAlpha = 1
      // Floating ?'s
      for (let i = 0; i < 5; i++) {
        const a = (this.time * 0.5 + i / 5) * Math.PI * 2
        const px = d.x + Math.cos(a) * (80 + i * 6)
        const py = dy + 200 + Math.sin(a) * (60 + i * 4)
        ctx.font = '22px sans-serif'
        ctx.globalAlpha = 0.25 + Math.sin(this.time * PULSE_SLOW + i) * 0.2
        ctx.fillStyle = '#ffd700'
        ctx.fillText('?', px, py)
      }
      ctx.globalAlpha = 1
    }

    // Reject message above door
    if (d.id === 'GENERAL' && d.rejectTimer > 0) {
      const a = Math.min(1, d.rejectTimer)
      ctx.save()
      ctx.globalAlpha = a
      ctx.font = `600 17px ${CONFIG.FONT_BODY}`
      prepTextRender(ctx)
      ctx.fillStyle = '#ffd700'
      ctx.textAlign = 'center'
      const rows = wrapText(ctx, d.rejectMsg, 280)
      let ry = dy - 20 - rows.length * 24
      for (const r of rows) { ctx.fillText(r, d.x, ry); ry += Math.max(20, Math.round(24)) }
      doneTextRender(ctx)
      ctx.restore()
    }

    ctx.restore()
  }

  render(ctx) {
    const W = CONFIG.W, H = CONFIG.H
    this.bg.render(ctx)
    ctx.save()
    ctx.textBaseline = 'middle'

    if (this.blastTimer > 0) {
      ctx.fillStyle = '#ffffff'
      ctx.globalAlpha = this.blastTimer * 0.6
      ctx.fillRect(0, 0, W, H)
      ctx.globalAlpha = 1
    }

    // Doors (drawn except in speed-sort mode)
    if (this.mode !== 'speed') {
      for (const d of this.doors) this.drawDoor(ctx, d)
    }

    if (this.mode !== 'speed') {
      // Cards (grid in R1, sequential centered in R2)
      const cw = this._cardW || 320
      const ch = this._cardH || 110
      for (const c of this.cards) {
        if (c.placed) continue
        const cx = c.x, cy = c.y
        const isHeld = c.held

        ctx.save()
        if (isHeld) {
          const tilt = (cx - W/2) / W * 0.18
          ctx.translate(cx, cy); ctx.rotate(tilt); ctx.translate(-cx, -cy)
        }
        ctx.fillStyle = isHeld ? 'rgba(0,229,255,0.10)' : 'rgba(8,6,28,0.95)'
        drawRoundRect(ctx, cx - cw/2, cy - ch/2, cw, ch, 14)
        ctx.fill()
        ctx.strokeStyle = isHeld ? '#00e5ff' : 'rgba(255,255,255,0.18)'
        ctx.lineWidth = isHeld ? 2.5 : 1
        drawRoundRect(ctx, cx - cw/2, cy - ch/2, cw, ch, 14)
        ctx.stroke()

        const emojiSize = c.isSeq ? 44 : 32
        ctx.font = `${emojiSize}px sans-serif`
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        const emojiX = cx - cw/2 + (c.isSeq ? 50 : 36)
        ctx.fillText(c.emoji, emojiX, cy)

        // Game 3 grid card text — 600 26px Inter
        ctx.font = `600 26px ${CONFIG.FONT_BODY}`
        prepTextRender(ctx)
        ctx.fillStyle = '#f1f5f9'
        const textMaxW = cw - (c.isSeq ? 120 : 90)
        const textStartX = cx - cw/2 + (c.isSeq ? 110 : 80)
        const rows = wrapText(ctx, c.text, textMaxW)
        ctx.textAlign = 'left'
        let ty = cy - (rows.length - 1) * 12
        for (const r of rows) { ctx.fillText(r, textStartX, ty); ty += Math.max(28, 30) }
        doneTextRender(ctx)
        ctx.restore()
      }
    } else {
      // SPEED SORT mode (R3)
      if (this.speedCurrent) {
        const card = this.speedCurrent
        const cw = 700
        const ch = 320
        const cx = W / 2, cy = H * 0.46
        const wrapW = Math.max(200, cw - 80)

        // Timer bar ABOVE card
        const tbW = cw, tbH = Math.max(12, Math.round(16))
        const tbX = cx - tbW / 2
        const tbY = cy - ch / 2 - Math.round(36)
        const prog = Math.max(0, this.speedTimer / this.speedLimit)
        ctx.fillStyle = 'rgba(255,255,255,0.10)'
        drawRoundRect(ctx, tbX, tbY, tbW, tbH, 8)
        ctx.fill()
        const warnR = this.speedLimit * 0.2
        const warnY = this.speedLimit * 0.42
        const barCol = this.speedTimer < warnR ? '#ff6b6b' : (this.speedTimer < warnY ? '#ffd700' : '#00e5ff')
        ctx.fillStyle = barCol
        drawRoundRect(ctx, tbX, tbY, tbW * prog, tbH, 8)
        ctx.fill()
        ctx.font = `700 15px ${CONFIG.FONT_MAIN}`
        prepTextRender(ctx)
        ctx.fillStyle = barCol
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.fillText(`${Math.max(0, this.speedTimer).toFixed(1)}s`, cx, tbY - Math.round(14))
        doneTextRender(ctx)

        ctx.save()
        const g = ctx.createLinearGradient(cx - cw / 2, cy - ch / 2, cx + cw / 2, cy + ch / 2)
        g.addColorStop(0, 'rgba(10, 8, 30, 0.98)')
        g.addColorStop(1, 'rgba(20, 12, 50, 0.96)')
        ctx.fillStyle = g
        drawRoundRect(ctx, cx - cw / 2, cy - ch / 2, cw, ch, 22)
        ctx.fill()
        ctx.strokeStyle = '#00e5ff'
        ctx.lineWidth = 3
        drawRoundRect(ctx, cx - cw / 2, cy - ch / 2, cw, ch, 22)
        ctx.stroke()

        if (this.speedFailDelay > 0 && !this.speedRevealAnswer) {
          ctx.fillStyle = `rgba(255, 107, 107, ${0.22 * Math.min(1, this.speedFailDelay)})`
          drawRoundRect(ctx, cx - cw / 2, cy - ch / 2, cw, ch, 22)
          ctx.fill()
        }

        ctx.font = '80px sans-serif'
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.fillText(card.emoji, cx, cy - 70)

        ctx.font = `700 26px ${CONFIG.FONT_BODY}`
        prepTextRender(ctx)
        ctx.fillStyle = '#f1f5f9'
        const rows = wrapText(ctx, card.text, wrapW)
        const lineStep = Math.max(Math.round(26), Math.round(34))
        let ry = cy + 30
        for (const r of rows) { ctx.fillText(r, cx, ry); ry += lineStep }
        doneTextRender(ctx)

        if (this.speedRevealTimer > 0 && this.speedRevealAnswer) {
          ctx.font = `900 32px ${CONFIG.FONT_MAIN}`
          prepTextRender(ctx)
          ctx.fillStyle = '#55efc4'
          ctx.fillText(`ANSWER: ${this.speedRevealAnswer}`, cx, cy + ch / 2 - 28)
          doneTextRender(ctx)
        }
        ctx.restore()
      }

      for (const b of this.speedButtons) {
        ctx.fillStyle = b.hover ? `${b.color}33` : 'rgba(10, 8, 30, 0.95)'
        drawRoundRect(ctx, b.x, b.y, b.w, b.h, 16)
        ctx.fill()
        ctx.strokeStyle = b.color
        ctx.lineWidth = b.hover ? 3.5 : 2
        drawRoundRect(ctx, b.x, b.y, b.w, b.h, 16)
        ctx.stroke()
        ctx.font = `700 26px ${CONFIG.FONT_MAIN}`
        prepTextRender(ctx)
        ctx.fillStyle = b.color
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.fillText(b.label, b.x + b.w / 2, b.y + b.h / 2)
        doneTextRender(ctx)
      }

      ctx.font = '30px sans-serif'
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      for (let i = 0; i < 5; i++) {
        ctx.globalAlpha = i < this.speedLives ? 1 : 0.2
        ctx.fillText('❤️', W / 2 - 88 + i * 44, 156)
      }
      ctx.globalAlpha = 1

      ctx.font = `600 17px ${CONFIG.FONT_MAIN}`
      ctx.fillStyle = '#00e5ff'
      ctx.globalAlpha = 0.85
      ctx.textAlign = 'right'
      ctx.fillText(`${this.speedCorrect} / ${this.speedAnswered}`, W - 28, 150)
      ctx.globalAlpha = 1
    }

    this.nova.render(ctx)
    this.hud.render(ctx)
    if (this.dialogue.isVisible()) this.dialogue.render(ctx)
    this.transition.render(ctx)
    this.missionCard.render(ctx)
    this.roundBanner.render(ctx)

    ctx.textAlign = 'left'
    ctx.textBaseline = 'alphabetic'
    ctx.restore()
  }
}

// ============================================================
// START
// ============================================================
window.addEventListener('click', () => { if (Audio.ctx?.state === 'suspended') Audio.ctx.resume() }, { once: true })
boot()
</script>
