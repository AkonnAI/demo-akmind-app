<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AKMIND SIGNAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #05050f;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }
    #game-canvas {
      position: absolute;
      display: block;
      image-rendering: crisp-edges;
    }
    #ui-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="rotate-msg" style="display:none;position:fixed;inset:0;background:#05050f;z-index:9999;flex-direction:column;align-items:center;justify-content:center;font-family:Orbitron,sans-serif;color:#00e5ff;font-size:20px;text-align:center;padding:40px;">
  <div style="font-size:60px;margin-bottom:20px;">📱</div>
  <div style="font-weight:700;margin-bottom:12px;">ROTATE YOUR DEVICE</div>
  <div style="font-size:14px;color:#8892b0;">This game plays best in landscape mode</div>
</div>
<canvas id="game-canvas"></canvas>
<div id="ui-layer"></div>
<script>
// ============================================================
// AKMIND SIGNAL — Game Engine
// ============================================================

// --- CONFIG ---
const CONFIG = {
  W: 1920, H: 1080,
  BG: '#05050f',
  CYAN: '#00e5ff',
  GOLD: '#ffd700',
  NOVA_DIM: '#3d3069',
  NOVA_MID: '#a29bfe',
  NOVA_FULL: '#ffd700',
  FONT_MAIN: 'Orbitron',
  FONT_BODY: 'Inter',
}

// --- CANVAS SETUP + SCALING ---
const canvas = document.getElementById('game-canvas')
const ctx = canvas.getContext('2d')
let scale = 1, offsetX = 0, offsetY = 0

function resize() {
  const ww = window.innerWidth
  const wh = window.innerHeight
  const scaleX = ww / CONFIG.W
  const scaleY = wh / CONFIG.H
  scale = Math.min(scaleX, scaleY)
  const dw = Math.floor(CONFIG.W * scale)
  const dh = Math.floor(CONFIG.H * scale)
  offsetX = Math.floor((ww - dw) / 2)
  offsetY = Math.floor((wh - dh) / 2)
  canvas.style.width = dw + 'px'
  canvas.style.height = dh + 'px'
  canvas.style.left = offsetX + 'px'
  canvas.style.top = offsetY + 'px'
  canvas.width = CONFIG.W
  canvas.height = CONFIG.H
  ctx.imageSmoothingEnabled = false
}
window.addEventListener('resize', () => {
  resize()
  checkOrientation()
})
resize()

// Minimum durations (accessibility)
const FAIL_PAUSE_MIN = 2.5
const PULSE_SLOW = Math.PI

// Crisp text: no shadow blur (causes softness on canvas). Use heavier font weights instead.
function prepTextRender(ctx) {
  ctx.imageSmoothingEnabled = false
}
function doneTextRender(ctx) {
  ctx.imageSmoothingEnabled = true
}

function vibrateCorrect() {
  try { if (navigator.vibrate) navigator.vibrate(50) } catch (_) {}
}
function vibrateWrong() {
  try { if (navigator.vibrate) navigator.vibrate([100, 50, 100]) } catch (_) {}
}
function vibrateRoundComplete() {
  try { if (navigator.vibrate) navigator.vibrate([50, 30, 50, 30, 200]) } catch (_) {}
}

function checkOrientation() {
  const msg = document.getElementById('rotate-msg')
  if (!msg) return
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
  if (isMobile && window.innerHeight > window.innerWidth) {
    msg.style.display = 'flex'
  } else {
    msg.style.display = 'none'
  }
}
window.addEventListener('resize', checkOrientation)
window.addEventListener('orientationchange', checkOrientation)
checkOrientation()

// Sprite assets (optional — draw only when loaded)
const gameSprites = {
  robot: new Image(),
  human: new Image(),
  brain: new Image(),
  bg: new Image(),
}
gameSprites.robot.src = 'game/sprites/robot.png'
gameSprites.human.src = 'game/sprites/human.png'
gameSprites.brain.src = 'game/sprites/brain (2).png'
gameSprites.bg.src = 'game/sprites/space_bg.jpg'

// --- POINTER INPUT (mouse + touch unified) ---
const pointer = { x: 0, y: 0, down: false, justDown: false, justUp: false }

function toCanvas(cx, cy) {
  return {
    x: (cx - offsetX) / scale,
    y: (cy - offsetY) / scale
  }
}

window.addEventListener('pointerdown', e => {
  const p = toCanvas(e.clientX, e.clientY)
  pointer.x = p.x; pointer.y = p.y
  pointer.down = true; pointer.justDown = true
})
window.addEventListener('pointermove', e => {
  const p = toCanvas(e.clientX, e.clientY)
  pointer.x = p.x; pointer.y = p.y
})
window.addEventListener('pointerup', e => {
  const p = toCanvas(e.clientX, e.clientY)
  pointer.x = p.x; pointer.y = p.y
  pointer.down = false; pointer.justUp = true
})

// --- AUDIO ---
const Audio = {
  ctx: null,
  buffers: {},
  musicSource: null,
  musicGain: null,
  muted: false,

  init() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)()
    this.masterGain = this.ctx.createGain()
    this.masterGain.connect(this.ctx.destination)
    this.musicGain = this.ctx.createGain()
    this.musicGain.gain.value = 0.4
    this.musicGain.connect(this.masterGain)
  },

  async load(key, url) {
    try {
      const res = await fetch(url)
      const buf = await res.arrayBuffer()
      this.buffers[key] = await this.ctx.decodeAudioData(buf)
    } catch(e) {
      console.warn('Audio load failed:', key, e)
    }
  },

  play(key, volume = 0.7) {
    if (this.muted || !this.buffers[key]) return
    if (this.ctx.state === 'suspended') this.ctx.resume()
    const src = this.ctx.createBufferSource()
    const gain = this.ctx.createGain()
    src.buffer = this.buffers[key]
    gain.gain.value = volume
    src.connect(gain)
    gain.connect(this.masterGain)
    src.start()
  },

  playMusic(key) {
    if (!this.buffers[key]) return
    if (this.musicSource) { try { this.musicSource.stop() } catch{} }
    if (this.ctx.state === 'suspended') this.ctx.resume()
    const src = this.ctx.createBufferSource()
    src.buffer = this.buffers[key]
    src.loop = true
    src.connect(this.musicGain)
    src.start()
    this.musicSource = src
  },

  stopMusic() {
    if (this.musicSource) { try { this.musicSource.stop() } catch{} this.musicSource = null }
  },

  toggle() {
    this.muted = !this.muted
    this.masterGain.gain.value = this.muted ? 0 : 1
    return this.muted
  }
}

// --- PARTICLES ---
const Particles = {
  list: [],

  spawn(x, y, count, colors, options = {}) {
    const { speed = 200, size = 6, life = 0.8, gravity = 300, spread = Math.PI * 2 } = options
    for (let i = 0; i < count; i++) {
      const angle = (Math.random() * spread) - spread / 2
      const spd = speed * (0.5 + Math.random() * 0.8)
      const col = Array.isArray(colors) ? colors[Math.floor(Math.random() * colors.length)] : colors
      this.list.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd - speed * 0.3,
        life: 1, maxLife: life * (0.7 + Math.random() * 0.6),
        size: size * (0.6 + Math.random() * 0.8),
        color: col, gravity,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 8
      })
    }
  },

  confetti(x, y) {
    this.spawn(x, y, 60,
      ['#ffd700','#00e5ff','#a29bfe','#ff6b6b','#55efc4','#fd79a8'],
      { speed: 480, size: 12, life: 2.2, gravity: 420, spread: Math.PI * 2 }
    )
  },

  correct(x, y) {
    this.spawn(x, y, 24,
      ['#00e5ff','#55efc4','#ffd700'],
      { speed: 280, size: 7, life: 0.9, gravity: 220 }
    )
  },

  wrong(x, y) {
    this.spawn(x, y, 12,
      ['#ff6b6b','#ff4444'],
      { speed: 160, size: 6, life: 0.5, gravity: 320 }
    )
  },

  burst(x, y, color) {
    this.spawn(x, y, 30,
      Array.isArray(color) ? color : [color],
      { speed: 360, size: 8, life: 1.0, gravity: 260 }
    )
  },

  update(dt) {
    for (let i = this.list.length - 1; i >= 0; i--) {
      const p = this.list[i]
      p.life -= dt / p.maxLife
      if (p.life <= 0) { this.list.splice(i, 1); continue }
      p.x += p.vx * dt
      p.y += p.vy * dt
      p.vy += p.gravity * dt
      p.vx *= 0.97
      p.rotation += p.rotSpeed * dt
    }
  },

  render(ctx) {
    ctx.save()
    for (const p of this.list) {
      ctx.globalAlpha = Math.max(0, p.life)
      ctx.fillStyle = p.color
      ctx.save()
      ctx.translate(p.x, p.y)
      ctx.rotate(p.rotation)
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size)
      ctx.restore()
    }
    ctx.globalAlpha = 1
    ctx.restore()
  }
}

// --- UTILS ---
function lerpColor(a, b, t) {
  t = Math.max(0, Math.min(1, t))
  const ah = a.replace('#',''), bh = b.replace('#','')
  const ar = parseInt(ah.slice(0,2),16), ag = parseInt(ah.slice(2,4),16), ab = parseInt(ah.slice(4,6),16)
  const br = parseInt(bh.slice(0,2),16), bg = parseInt(bh.slice(2,4),16), bb = parseInt(bh.slice(4,6),16)
  const r = Math.round(ar+(br-ar)*t), g = Math.round(ag+(bg-ag)*t), b2 = Math.round(ab+(bb-ab)*t)
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b2.toString(16).padStart(2,'0')}`
}

function rectHit(rx, ry, rw, rh, px, py) {
  return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh
}

function circleHit(cx, cy, r, px, py) {
  return Math.hypot(px - cx, py - cy) <= r
}

function drawRoundRect(ctx, x, y, w, h, r) {
  ctx.beginPath()
  ctx.roundRect(x, y, w, h, r)
}

function wrapText(ctx, text, maxW) {
  const words = text.split(' ')
  const rows = []
  let row = ''
  for (const w of words) {
    const test = row + (row ? ' ' : '') + w
    if (ctx.measureText(test).width > maxW && row) { rows.push(row); row = w }
    else row = test
  }
  if (row) rows.push(row)
  return rows
}

// Easing
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3) }
function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2)
}

// --- BACKGROUND (per-scene atmosphere) ---
class Background {
  constructor(mode = 'menu') {
    this.mode = mode
    this.time = 0
    this.stars = Array.from({length: 160}, () => ({
      x: Math.random() * CONFIG.W,
      y: Math.random() * CONFIG.H,
      size: 0.5 + Math.random() * 2.2,
      twinkle: Math.random() * Math.PI * 2,
      speed: 0.3 + Math.random() * 0.8
    }))
    // Precompute constellation pairs for lesson2
    this.constellation = []
    for (let i = 0; i < this.stars.length; i++) {
      const s1 = this.stars[i]
      for (let j = i + 1; j < this.stars.length; j++) {
        const s2 = this.stars[j]
        const d = Math.hypot(s1.x - s2.x, s1.y - s2.y)
        if (d < 180) this.constellation.push([i, j, d])
        if (this.constellation.length > 90) break
      }
      if (this.constellation.length > 90) break
    }
    this.shootingStars = []
    this.shootTimer = 3
  }

  update(dt) {
    this.time += dt
    if (this.mode === 'lesson2') {
      this.shootTimer -= dt
      if (this.shootTimer <= 0) {
        this.shootTimer = 3
        const fromLeft = Math.random() < 0.5
        this.shootingStars.push({
          x: fromLeft ? -50 : CONFIG.W + 50,
          y: 50 + Math.random() * (CONFIG.H * 0.4),
          vx: (fromLeft ? 1 : -1) * (450 + Math.random() * 300),
          vy: 120 + Math.random() * 140,
          life: 1
        })
      }
      for (let i = this.shootingStars.length - 1; i >= 0; i--) {
        const s = this.shootingStars[i]
        s.x += s.vx * dt
        s.y += s.vy * dt
        s.life -= dt / 0.8
        if (s.life <= 0 || s.x < -200 || s.x > CONFIG.W + 200) this.shootingStars.splice(i, 1)
      }
    }
  }

  render(ctx) {
    const W = CONFIG.W, H = CONFIG.H

    if (gameSprites.bg.complete && gameSprites.bg.naturalWidth > 0) {
      ctx.drawImage(gameSprites.bg, 0, 0, W, H)
    }

    // Base atmospheric layer
    if (this.mode === 'lesson2') {
      const g = ctx.createLinearGradient(0, 0, 0, H)
      g.addColorStop(0, '#0a0830')
      g.addColorStop(0.5, '#06061e')
      g.addColorStop(1, '#100835')
      ctx.fillStyle = g
      ctx.fillRect(0, 0, W, H)
    } else if (this.mode === 'lesson3') {
      // Split arena
      const gl = ctx.createLinearGradient(0, 0, W * 0.45, 0)
      gl.addColorStop(0, 'rgba(0, 60, 100, 0.45)')
      gl.addColorStop(1, 'rgba(5,5,15,0)')
      ctx.fillStyle = '#05050f'
      ctx.fillRect(0, 0, W, H)
      ctx.fillStyle = gl
      ctx.fillRect(0, 0, W, H)

      const gr = ctx.createLinearGradient(W * 0.55, 0, W, 0)
      gr.addColorStop(0, 'rgba(5,5,15,0)')
      gr.addColorStop(1, 'rgba(120, 70, 0, 0.45)')
      ctx.fillStyle = gr
      ctx.fillRect(0, 0, W, H)

      // Cyan circuit pattern (left)
      ctx.strokeStyle = 'rgba(0, 229, 255, 0.08)'
      ctx.lineWidth = 1
      for (let x = 40; x < W * 0.32; x += 90) {
        for (let y = 100; y < H; y += 90) {
          ctx.beginPath()
          ctx.moveTo(x, y); ctx.lineTo(x + 50, y)
          ctx.moveTo(x + 25, y); ctx.lineTo(x + 25, y + 50)
          ctx.stroke()
          ctx.beginPath()
          ctx.arc(x + 25, y, 2, 0, Math.PI * 2)
          ctx.fillStyle = 'rgba(0, 229, 255, 0.12)'
          ctx.fill()
        }
      }

      // Warm amber glow (right)
      const ar = ctx.createRadialGradient(W * 0.85, H * 0.5, 50, W * 0.85, H * 0.5, 500)
      ar.addColorStop(0, 'rgba(255, 180, 60, 0.10)')
      ar.addColorStop(1, 'rgba(0,0,0,0)')
      ctx.fillStyle = ar
      ctx.fillRect(W * 0.55, 0, W * 0.45, H)
    } else if (this.mode === 'lesson4') {
      ctx.fillStyle = '#05050f'
      ctx.fillRect(0, 0, W, H)
      const zones = [
        { cx: W * 0.22, color: 'rgba(107, 203, 255, 0.18)', pulse: 0 },
        { cx: W * 0.50, color: 'rgba(255, 215, 0, 0.14)', pulse: 1 },
        { cx: W * 0.78, color: 'rgba(255, 107, 107, 0.18)', pulse: 2 },
      ]
      for (const z of zones) {
        const p = 0.85 + Math.sin(this.time * 1.2 + z.pulse) * 0.15
        const g = ctx.createRadialGradient(z.cx, H * 0.45, 60, z.cx, H * 0.45, 380 * p)
        g.addColorStop(0, z.color)
        g.addColorStop(1, 'rgba(0,0,0,0)')
        ctx.fillStyle = g
        ctx.fillRect(0, 0, W, H)
      }
    } else {
      if (!gameSprites.bg.complete || gameSprites.bg.naturalWidth <= 0) {
        ctx.fillStyle = CONFIG.BG
        ctx.fillRect(0, 0, W, H)
      }
    }

    // Constellation (Lesson 2) — slow rotation
    if (this.mode === 'lesson2') {
      ctx.save()
      ctx.translate(W/2, H/2)
      ctx.rotate(this.time * 0.012)
      ctx.translate(-W/2, -H/2)
      ctx.strokeStyle = 'rgba(162, 155, 254, 0.18)'
      ctx.lineWidth = 0.7
      for (const [i, j, d] of this.constellation) {
        const s1 = this.stars[i], s2 = this.stars[j]
        ctx.globalAlpha = (1 - d / 180) * 0.4
        ctx.beginPath()
        ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y)
        ctx.stroke()
      }
      ctx.globalAlpha = 1
      ctx.restore()
    }

    // Stars
    ctx.save()
    for (const s of this.stars) {
      const a = 0.2 + Math.sin(this.time * s.speed + s.twinkle) * 0.35
      ctx.globalAlpha = Math.max(0, a)
      ctx.fillStyle = '#ffffff'
      ctx.beginPath()
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2)
      ctx.fill()
    }
    ctx.globalAlpha = 1
    ctx.restore()

    // Shooting stars
    for (const s of this.shootingStars) {
      ctx.save()
      ctx.globalAlpha = Math.max(0, s.life)
      const tx = s.x - s.vx * 0.08, ty = s.y - s.vy * 0.08
      const g = ctx.createLinearGradient(tx, ty, s.x, s.y)
      g.addColorStop(0, 'rgba(255,255,255,0)')
      g.addColorStop(1, '#ffffff')
      ctx.strokeStyle = g
      ctx.lineWidth = 2
      ctx.beginPath()
      ctx.moveTo(tx, ty); ctx.lineTo(s.x, s.y)
      ctx.stroke()
      ctx.fillStyle = '#ffffff'
      ctx.beginPath()
      ctx.arc(s.x, s.y, 2, 0, Math.PI * 2)
      ctx.fill()
      ctx.restore()
    }
  }
}

// --- NOVA ORB ---
class Nova {
  constructor(x, y, power = 0.15) {
    this.x = x; this.y = y
    this.tx = x; this.ty = y
    this.power = power
    this.expression = 'idle'
    this.time = 0
    this.pulseT = 0
    this.bounceY = 0
    this.bounceVel = 0
    this.shakeT = 0
    this.showName = true
  }

  moveTo(x, y) { this.tx = x; this.ty = y }
  setPower(p) { this.power = Math.max(0, Math.min(1, p)) }
  setExpression(e) { this.expression = e }

  bounce() {
    this.bounceVel = -380
    this.setExpression('happy')
  }

  shake() {
    this.shakeT = 0.4
    this.setExpression('worried')
  }

  update(dt) {
    this.time += dt
    this.pulseT += dt
    if (this.pulseT > 1.5) this.pulseT = 0
    const lf = 1 - Math.exp(-4 * dt)
    this.x += (this.tx - this.x) * lf
    this.y += (this.ty - this.y) * lf

    // Bounce physics
    if (this.bounceY !== 0 || this.bounceVel !== 0) {
      this.bounceY += this.bounceVel * dt
      this.bounceVel += 1400 * dt
      if (this.bounceY > 0) { this.bounceY = 0; this.bounceVel = 0 }
    }

    if (this.shakeT > 0) this.shakeT = Math.max(0, this.shakeT - dt)
  }

  color() {
    const p = this.power
    if (p < 0.5) return lerpColor('#3d3069', '#a29bfe', p * 2)
    return lerpColor('#a29bfe', '#ffd700', (p - 0.5) * 2)
  }

  render(ctx) {
    const shakeX = this.shakeT > 0 ? Math.sin(this.shakeT * 60) * 14 : 0
    const cx = this.x + shakeX
    const cy = this.y + Math.sin(this.time * 1.8) * 8 + this.bounceY
    const r = 45 + this.power * 25
    const col = this.color()

    ctx.save()

    // Outer glow rings
    for (let i = 3; i >= 1; i--) {
      ctx.beginPath()
      ctx.arc(cx, cy, r + i * 18, 0, Math.PI * 2)
      ctx.strokeStyle = col
      ctx.globalAlpha = 0.05 + this.power * 0.06
      ctx.lineWidth = 2
      ctx.stroke()
    }

    // Pulse ring
    const pr = r + (this.pulseT / 1.5) * 100
    ctx.beginPath()
    ctx.arc(cx, cy, pr, 0, Math.PI * 2)
    ctx.strokeStyle = col
    ctx.globalAlpha = (1 - this.pulseT / 1.5) * 0.35 * this.power
    ctx.lineWidth = 1.8
    ctx.stroke()
    ctx.globalAlpha = 1

    // Core fill
    ctx.beginPath()
    ctx.arc(cx, cy, r, 0, Math.PI * 2)
    ctx.fillStyle = col
    ctx.globalAlpha = 0.14 + this.power * 0.10
    ctx.fill()
    ctx.globalAlpha = 1
    ctx.strokeStyle = col
    ctx.lineWidth = 3
    ctx.stroke()

    // Face
    const eyeR = 5 + this.power * 2.5
    const eyeX = r * 0.32
    const eyeY = -r * 0.08
    ctx.fillStyle = col
    ctx.globalAlpha = 0.5 + this.power * 0.5

    if (this.expression === 'happy' || this.expression === 'excited') {
      ctx.beginPath(); ctx.arc(cx - eyeX, cy + eyeY, eyeR, Math.PI, 0); ctx.fill()
      ctx.beginPath(); ctx.arc(cx + eyeX, cy + eyeY, eyeR, Math.PI, 0); ctx.fill()
      ctx.beginPath(); ctx.arc(cx, cy + r * 0.24, r * 0.24, 0.2, Math.PI - 0.2)
      ctx.strokeStyle = col; ctx.lineWidth = 2.5; ctx.stroke()
    } else if (this.expression === 'worried' || this.expression === 'sad') {
      ctx.beginPath(); ctx.arc(cx - eyeX, cy + eyeY, eyeR * 0.7, 0, Math.PI * 2); ctx.fill()
      ctx.beginPath(); ctx.arc(cx + eyeX, cy + eyeY, eyeR * 0.7, 0, Math.PI * 2); ctx.fill()
      ctx.beginPath(); ctx.arc(cx, cy + r * 0.38, r * 0.22, Math.PI + 0.2, -0.2)
      ctx.strokeStyle = col; ctx.lineWidth = 2.5; ctx.stroke()
    } else {
      ctx.beginPath(); ctx.arc(cx - eyeX, cy + eyeY, eyeR, 0, Math.PI * 2); ctx.fill()
      ctx.beginPath(); ctx.arc(cx + eyeX, cy + eyeY, eyeR, 0, Math.PI * 2); ctx.fill()
    }
    ctx.globalAlpha = 1

    // Name label below
    if (this.showName) {
      ctx.font = `700 13px ${CONFIG.FONT_MAIN}`
      prepTextRender(ctx)
      ctx.fillStyle = col
      ctx.globalAlpha = 0.7
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.fillText('NOVA', cx, cy + r + 22)
      doneTextRender(ctx)
      ctx.globalAlpha = 1
    }

    ctx.textAlign = 'left'
    ctx.textBaseline = 'alphabetic'
    ctx.restore()
  }
}

// Helper to draw a mini-Nova for dialogue avatar
function drawMiniNova(ctx, x, y, r, time, power = 0.4) {
  const col = power < 0.5 ? lerpColor('#3d3069', '#a29bfe', power * 2) : lerpColor('#a29bfe', '#ffd700', (power - 0.5) * 2)
  ctx.save()
  // glow
  ctx.beginPath(); ctx.arc(x, y, r + 8, 0, Math.PI * 2)
  ctx.strokeStyle = col; ctx.globalAlpha = 0.2; ctx.lineWidth = 2; ctx.stroke()
  // core
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2)
  ctx.fillStyle = col; ctx.globalAlpha = 0.15; ctx.fill()
  ctx.globalAlpha = 1
  ctx.strokeStyle = col; ctx.lineWidth = 2.5; ctx.stroke()
  // eyes
  const eyeR = r * 0.14
  const eyeX = r * 0.32
  ctx.fillStyle = col
  ctx.globalAlpha = 0.85
  ctx.beginPath(); ctx.arc(x - eyeX, y - r * 0.08, eyeR, 0, Math.PI * 2); ctx.fill()
  ctx.beginPath(); ctx.arc(x + eyeX, y - r * 0.08, eyeR, 0, Math.PI * 2); ctx.fill()
  ctx.globalAlpha = 1
  ctx.restore()
}

// --- DIALOGUE BOX ---
class DialogueBox {
  constructor() {
    this.visible = false
    this.lines = []
    this.idx = 0
    this.displayed = ''
    this.typeT = 0
    this.SPEED = 0.015
    this.done = false
    this.onDone = null
    this.time = 0
    this.position = 'bottom'
  }

  show(lines, onDone) {
    this.lines = lines
    this.idx = 0
    this.displayed = ''
    this.typeT = 0
    this.done = false
    this.visible = true
    this.onDone = onDone || null
    this.time = 0
  }

  hide() { this.visible = false }
  isVisible() { return this.visible }
  setPosition(pos) { this.position = pos }

  advance() {
    if (!this.visible) return
    if (!this.done) { this.displayed = this.lines[this.idx]?.text || ''; this.done = true; return }
    this.idx++
    if (this.idx >= this.lines.length) {
      this.visible = false
      if (this.onDone) this.onDone()
      return
    }
    this.displayed = ''; this.typeT = 0; this.done = false
  }

  update(dt) {
    if (!this.visible) return
    this.time += dt
    if (this.done) return
    const target = this.lines[this.idx]?.text || ''
    this.typeT += dt
    while (this.typeT >= this.SPEED && this.displayed.length < target.length) {
      this.typeT -= this.SPEED
      this.displayed += target[this.displayed.length]
    }
    if (this.displayed.length >= target.length) this.done = true
  }

  render(ctx) {
    if (!this.visible) return
    const line = this.lines[this.idx]
    if (!line) return

    const W = CONFIG.W, H = CONFIG.H
    const COLORS = { NOVA: '#a29bfe', SYSTEM: '#00e5ff', NARRATOR: '#94a3b8' }
    const col = COLORS[line.speaker] || '#00e5ff'
    const BH = Math.max(160, Math.round(200))
    const BY = this.position === 'top' ? Math.round(100) : H - BH
    const isNova = line.speaker === 'NOVA'
    const avatarSize = Math.round(50)
    const pad = Math.round(40)
    const textStart = isNova ? pad + avatarSize * 2 + 20 : pad

    ctx.save()

    // Background
    ctx.fillStyle = 'rgba(8, 8, 26, 0.96)'
    ctx.fillRect(0, BY, W, BH)

    // Subtle inner glow
    const g = ctx.createLinearGradient(0, BY, 0, BY + BH)
    g.addColorStop(0, `${col}22`)
    g.addColorStop(0.5, 'rgba(0,0,0,0)')
    g.addColorStop(1, `${col}11`)
    ctx.fillStyle = g
    ctx.fillRect(0, BY, W, BH)

    // Border line
    ctx.strokeStyle = col
    ctx.globalAlpha = 0.55
    ctx.lineWidth = 2.5
    ctx.beginPath()
    ctx.moveTo(0, this.position === 'top' ? BY + BH : BY)
    ctx.lineTo(W, this.position === 'top' ? BY + BH : BY)
    ctx.stroke()
    ctx.globalAlpha = 1

    // Left accent
    ctx.fillStyle = col
    ctx.fillRect(0, BY, 6, BH)

    // NOVA mini-orb avatar
    if (isNova) {
      drawMiniNova(ctx, pad + avatarSize, BY + BH / 2, avatarSize, this.time, 0.45)
    }

    // Speaker name
    ctx.font = `700 26px ${CONFIG.FONT_MAIN}`
    prepTextRender(ctx)
    ctx.fillStyle = col
    ctx.textAlign = 'left'
    ctx.textBaseline = 'middle'
    ctx.fillText(line.speaker, textStart, BY + 46)

    // Body text
    ctx.font = `600 28px ${CONFIG.FONT_BODY}`
    prepTextRender(ctx)
    ctx.fillStyle = '#f1f5f9'
    const rows = wrapText(ctx, this.displayed, W - textStart - pad - Math.round(120))
    let ty = BY + 92
    for (const r of rows) {
      if (ty > BY + BH - 20) break
      ctx.fillText(r, textStart, ty)
      ty += Math.max(36, 40)
    }
    doneTextRender(ctx)

    // Advance prompt
    if (this.done) {
      const pulse = 0.5 + Math.sin(this.time * PULSE_SLOW) * 0.4
      ctx.globalAlpha = pulse
      ctx.font = `600 19px ${CONFIG.FONT_BODY}`
      prepTextRender(ctx)
      ctx.fillStyle = col
      ctx.fillText('▶ TAP TO CONTINUE', textStart, BY + BH - 20)
      doneTextRender(ctx)
      ctx.globalAlpha = 1
    }

    // Counter
    if (this.lines.length > 1) {
      ctx.font = `400 17px ${CONFIG.FONT_BODY}`
      prepTextRender(ctx)
      ctx.fillStyle = col
      ctx.globalAlpha = 0.5
      ctx.textAlign = 'right'
      ctx.fillText(`${this.idx + 1}/${this.lines.length}`, W - pad, BY + BH - 20)
      doneTextRender(ctx)
      ctx.globalAlpha = 1
    }

    ctx.textAlign = 'left'
    ctx.restore()
  }
}

// --- HUD ---
class HUD {
  constructor() {
    this.worldName = ''
    this.objective = ''
    this.message = ''
    this.msgTimer = 0
    this.msgColor = '#00e5ff'
    this.xp = 0
    this.xpDisplay = 0
    this.novaPower = 0
    this.time = 0
    this.muted = false
    this.muteBtn = { x: 0, y: 0, w: 44, h: 44 }
    this.round = 0
    this.totalRounds = 0
  }

  setWorld(name) { this.worldName = name }
  setObjective(s) { this.objective = s }
  setNovaPower(p) { this.novaPower = p }
  setMuted(m) { this.muted = m }
  setRound(n, total) { this.round = n; this.totalRounds = total }
  addXP(n) { this.xp += n; this.showMessage(`+${n} XP`, 1.5, '#ffd700') }
  showMessage(msg, dur = 3, col = '#00e5ff') {
    this.message = msg; this.msgTimer = dur; this.msgColor = col
  }

  update(dt) {
    this.time += dt
    if (this.msgTimer > 0) { this.msgTimer -= dt; if (this.msgTimer <= 0) this.message = '' }
    if (this.xpDisplay < this.xp) this.xpDisplay = Math.min(this.xp, this.xpDisplay + Math.max(3, (this.xp - this.xpDisplay) * 0.08))
  }

  hitMuteBtn(x, y) {
    const b = this.muteBtn
    return x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h
  }

  render(ctx) {
    const W = CONFIG.W
    const ROW = Math.round(80)
    const OBJ_H = Math.max(Math.round(36), 28)

    ctx.save()
    ctx.textBaseline = 'middle'

    ctx.fillStyle = 'rgba(5,5,20,0.94)'
    ctx.fillRect(0, 0, W, ROW)
    ctx.strokeStyle = 'rgba(0,229,255,0.18)'
    ctx.lineWidth = 1
    ctx.beginPath(); ctx.moveTo(0, ROW); ctx.lineTo(W, ROW); ctx.stroke()

    // World name — 600 16px
    ctx.font = `600 16px ${CONFIG.FONT_MAIN}`
    prepTextRender(ctx)
    ctx.fillStyle = '#00e5ff'
    ctx.textAlign = 'left'
    ctx.fillText(this.worldName, 32, ROW / 2)
    doneTextRender(ctx)

    // Nova power bar (320 x 10)
    const bw = 320, bh = 10
    const bx = (W - bw) / 2, by = (ROW - bh) / 2 + 4
    ctx.fillStyle = 'rgba(255,255,255,0.08)'
    drawRoundRect(ctx, bx, by, bw, bh, 5)
    ctx.fill()
    const pc = lerpColor('#3d3069', this.novaPower < 0.5 ? '#a29bfe' : '#ffd700',
      this.novaPower < 0.5 ? this.novaPower * 2 : (this.novaPower - 0.5) * 2)
    ctx.fillStyle = pc
    drawRoundRect(ctx, bx, by, bw * this.novaPower, bh, 5)
    ctx.fill()

    // Animated dot travelling along filled portion
    if (this.novaPower > 0.02) {
      const fillW = bw * this.novaPower
      const dotPos = (Math.sin(this.time * 1.5) * 0.5 + 0.5) * fillW
      ctx.beginPath()
      ctx.arc(bx + dotPos, by + bh/2, 5, 0, Math.PI * 2)
      ctx.fillStyle = '#ffffff'
      ctx.globalAlpha = 0.9
      ctx.fill()
      ctx.beginPath()
      ctx.arc(bx + dotPos, by + bh/2, 9, 0, Math.PI * 2)
      ctx.fillStyle = pc
      ctx.globalAlpha = 0.35
      ctx.fill()
      ctx.globalAlpha = 1
    }

    ctx.font = `400 13px ${CONFIG.FONT_MAIN}`
    prepTextRender(ctx)
    ctx.fillStyle = pc
    ctx.textAlign = 'center'
    ctx.fillText(`NOVA ${Math.round(this.novaPower * 100)}%`, W / 2, by - 12)
    doneTextRender(ctx)

    // XP
    ctx.font = `700 18px ${CONFIG.FONT_MAIN}`
    prepTextRender(ctx)
    ctx.fillStyle = '#ffd700'
    ctx.textAlign = 'right'
    ctx.fillText(`${Math.round(this.xpDisplay)} XP`, W - 110, ROW / 2)
    doneTextRender(ctx)

    // Mute button — tap-target inside HUD, 60x60 (HUD is 80, sits centered)
    const muteSize = Math.max(44, Math.round(60))
    const bx2 = W - 80, by2 = (ROW - muteSize) / 2
    this.muteBtn = { x: bx2 - 10, y: 0, w: muteSize + 20, h: ROW } // generous 80x80 tap target
    ctx.fillStyle = 'rgba(255,255,255,0.06)'
    ctx.beginPath()
    ctx.roundRect(bx2, by2, muteSize, muteSize, 10)
    ctx.fill()
    ctx.font = '26px sans-serif'
    prepTextRender(ctx)
    ctx.textAlign = 'center'
    ctx.fillText(this.muted ? '🔇' : '🔊', bx2 + muteSize/2, by2 + muteSize/2)
    doneTextRender(ctx)

    // Objective + Round indicator
    const OBJ_Y = ROW
    ctx.fillStyle = 'rgba(3,3,14,0.9)'
    ctx.fillRect(0, OBJ_Y, W, OBJ_H)

    ctx.globalAlpha = 0.7 + Math.sin(this.time * 1.5) * 0.2
    ctx.font = `600 16px ${CONFIG.FONT_BODY}`
    prepTextRender(ctx)
    ctx.fillStyle = '#cbd5e1'
    ctx.textAlign = 'center'
    ctx.fillText(this.objective, W / 2, OBJ_Y + OBJ_H / 2)
    doneTextRender(ctx)
    ctx.globalAlpha = 1

    if (this.totalRounds > 0) {
      ctx.font = `700 16px ${CONFIG.FONT_MAIN}`
      ctx.fillStyle = '#ffd700'
      ctx.textAlign = 'right'
      ctx.fillText(`ROUND ${this.round}/${this.totalRounds}`, W - 24, OBJ_Y + OBJ_H / 2)
    }

    // Flash message
    if (this.message) {
      const a = this.msgTimer > 0.5 ? 1 : this.msgTimer * 2
      ctx.save()
      ctx.globalAlpha = a
      ctx.font = `700 30px ${CONFIG.FONT_MAIN}`
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      const mw = ctx.measureText(this.message).width + 56
      const mh = 70
      const mx = W/2 - mw/2, my = CONFIG.H/2 - mh/2 - 100
      ctx.fillStyle = 'rgba(0,0,0,0.88)'
      ctx.fillRect(mx, my, mw, mh)
      ctx.strokeStyle = this.msgColor
      ctx.lineWidth = 2
      ctx.strokeRect(mx, my, mw, mh)
      ctx.fillStyle = this.msgColor
      prepTextRender(ctx)
      ctx.fillText(this.message, W/2, my + mh/2)
      doneTextRender(ctx)
      ctx.restore()
    }

    ctx.textAlign = 'left'
    ctx.restore()
  }
}

// --- MISSION CARD (mandatory 10s briefing) ---
class MissionCard {
  constructor() {
    this.visible = false
    this.title = ''
    this.description = ''
    this.objective = ''
    this.duration = 10
    this.timer = 0
    this.ready = false
    this.onDone = null
    this.nova = new Nova(0, 0, 0.4)
    this.nova.showName = false
    this.time = 0
    this.btnHover = false
    this.fadeIn = 0
  }

  show(title, description, objective, onDone) {
    this.title = title
    this.description = description
    this.objective = objective
    this.timer = this.duration
    this.ready = false
    this.onDone = onDone || null
    this.visible = true
    this.time = 0
    this.fadeIn = 0
    this.btnHover = false
    this.nova.setExpression('idle')
    this.nova.x = CONFIG.W / 2
    this.nova.y = 340
    this.nova.tx = CONFIG.W / 2
    this.nova.ty = 340
  }

  isVisible() { return this.visible }

  update(dt) {
    if (!this.visible) return
    this.time += dt
    this.fadeIn = Math.min(1, this.fadeIn + dt * 2.5)
    if (this.timer > 0) {
      this.timer = Math.max(0, this.timer - dt)
      if (this.timer === 0 && !this.ready) {
        this.ready = true
        this.nova.setExpression('happy')
        Audio.play('click', 0.4)
        Particles.burst(CONFIG.W/2, CONFIG.H - 180, ['#55efc4', '#00e5ff'])
      }
    }

    this.nova.update(dt)
    this.nova.moveTo(CONFIG.W / 2, 340 + Math.sin(this.time * 1.2) * 14)

    const bx = CONFIG.W/2 - 240, by = CONFIG.H - 200, bw = 480, bh = 100
    this.btnHover = this.ready && rectHit(bx, by, bw, bh, pointer.x, pointer.y)

    if (pointer.justDown) {
      if (this.ready && this.btnHover) {
        Audio.play('click')
        this.visible = false
        if (this.onDone) this.onDone()
      }
      // else: pointer is consumed (do nothing — can't skip)
    }
  }

  render(ctx) {
    if (!this.visible) return
    const W = CONFIG.W, H = CONFIG.H

    ctx.save()
    ctx.textBaseline = 'middle'

    // Heavy dark overlay — rgba(0,0,8,0.95)
    ctx.fillStyle = 'rgba(0, 0, 8, 0.95)'
    ctx.globalAlpha = this.fadeIn
    ctx.fillRect(0, 0, W, H)
    ctx.globalAlpha = 1

    // Grid pattern
    ctx.strokeStyle = 'rgba(0, 229, 255, 0.05)'
    ctx.lineWidth = 1
    for (let x = 0; x <= W; x += 100) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke()
    }
    for (let y = 0; y <= H; y += 100) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke()
    }

    // Header banner
    ctx.fillStyle = 'rgba(0, 229, 255, 0.10)'
    ctx.fillRect(0, 80, W, 60)
    ctx.font = `700 22px ${CONFIG.FONT_MAIN}`
    prepTextRender(ctx)
    ctx.fillStyle = '#00e5ff'
    ctx.textAlign = 'center'
    ctx.fillText('▣ MISSION BRIEFING — INCOMING TRANSMISSION ▣', W/2, 110)
    doneTextRender(ctx)

    // Timer ring (top center under header) — 80px radius, 6px stroke
    const tcx = W/2, tcy = 240, tcr = 80
    const progress = 1 - this.timer / this.duration

    // Background ring
    ctx.beginPath()
    ctx.arc(tcx, tcy, tcr, 0, Math.PI * 2)
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'
    ctx.lineWidth = 6
    ctx.stroke()

    // Progress arc — depleting clockwise
    ctx.beginPath()
    ctx.arc(tcx, tcy, tcr, -Math.PI/2, -Math.PI/2 + progress * Math.PI * 2)
    ctx.strokeStyle = this.ready ? '#55efc4' : '#00e5ff'
    ctx.lineWidth = 6
    ctx.lineCap = 'round'
    ctx.stroke()
    ctx.lineCap = 'butt'

    // Timer number — large in center
    ctx.font = `900 56px ${CONFIG.FONT_MAIN}`
    prepTextRender(ctx)
    ctx.fillStyle = this.ready ? '#55efc4' : '#00e5ff'
    ctx.fillText(this.ready ? 'GO!' : Math.ceil(this.timer).toString(), tcx, tcy)
    doneTextRender(ctx)

    // Nova
    this.nova.render(ctx)

    // Title — 900 72px Orbitron
    ctx.font = `900 72px ${CONFIG.FONT_MAIN}`
    prepTextRender(ctx)
    ctx.fillStyle = '#ffd700'
    ctx.fillText(this.title, W/2, 490)
    doneTextRender(ctx)

    // Divider
    ctx.strokeStyle = 'rgba(255, 215, 0, 0.4)'
    ctx.lineWidth = 2
    ctx.beginPath()
    ctx.moveTo(W/2 - 220, 540); ctx.lineTo(W/2 + 220, 540)
    ctx.stroke()

    // Description — 600 24px Inter
    ctx.font = `600 24px ${CONFIG.FONT_BODY}`
    prepTextRender(ctx)
    ctx.fillStyle = '#f1f5f9'
    const descRows = wrapText(ctx, this.description, W - 500)
    let dy = 600
    for (const row of descRows) {
      ctx.fillText(row, W/2, dy)
      dy += 40
    }
    doneTextRender(ctx)

    // Objective header — 700 24px Orbitron
    dy += 24
    ctx.font = `700 24px ${CONFIG.FONT_MAIN}`
    prepTextRender(ctx)
    ctx.fillStyle = '#00e5ff'
    ctx.fillText('▶ MISSION OBJECTIVE', W/2, dy)
    doneTextRender(ctx)
    dy += 40

    // Objective (cyan) — 600 24px Inter
    ctx.font = `600 24px ${CONFIG.FONT_BODY}`
    prepTextRender(ctx)
    ctx.fillStyle = '#00e5ff'
    const objRows = wrapText(ctx, this.objective, W - 500)
    for (const row of objRows) {
      ctx.fillText(row, W/2, dy)
      dy += 36
    }
    doneTextRender(ctx)

    // Button or wait text
    const bx = W/2 - 240, by = H - 200, bw = 480, bh = Math.max(Math.round(80), Math.round(100))

    if (this.ready) {
      const pulse = 0.75 + Math.sin(this.time * PULSE_SLOW) * 0.25
      ctx.fillStyle = this.btnHover ? 'rgba(85, 239, 196, 0.30)' : 'rgba(85, 239, 196, 0.12)'
      drawRoundRect(ctx, bx, by, bw, bh, 20)
      ctx.fill()
      ctx.strokeStyle = '#55efc4'
      ctx.lineWidth = this.btnHover ? 4 : 3
      ctx.globalAlpha = pulse
      drawRoundRect(ctx, bx, by, bw, bh, 20)
      ctx.stroke()
      ctx.globalAlpha = 1

      ctx.font = `900 30px ${CONFIG.FONT_MAIN}`
      prepTextRender(ctx)
      ctx.fillStyle = '#55efc4'
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.fillText('TAP TO BEGIN', W/2, by + bh/2)
      doneTextRender(ctx)
    } else {
      ctx.font = `600 24px ${CONFIG.FONT_BODY}`
      prepTextRender(ctx)
      ctx.fillStyle = 'rgba(203, 213, 225, 0.6)'
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.fillText(`▣ READ THE BRIEFING — UNLOCKING IN ${Math.ceil(this.timer)}s ▣`, W/2, by + bh/2)
      doneTextRender(ctx)
    }

    ctx.textAlign = 'left'
    ctx.restore()
  }
}

// --- ROUND COMPLETE BANNER ---
class RoundBanner {
  constructor() {
    this.visible = false
    this.timer = 0
    this.duration = 2.5
    this.roundNum = 0
    this.xpEarned = 0
    this.xpDisplay = 0
    this.onDone = null
    this.time = 0
    this.fired = false
  }

  show(roundNum, xpEarned, onDone) {
    this.visible = true
    this.timer = this.duration
    this.roundNum = roundNum
    this.xpEarned = xpEarned
    this.xpDisplay = 0
    this.onDone = onDone || null
    this.time = 0
    this.fired = false
    Particles.confetti(CONFIG.W * 0.3, CONFIG.H * 0.5)
    Particles.confetti(CONFIG.W * 0.7, CONFIG.H * 0.5)
    Audio.play('victory', 0.6)
  }

  isVisible() { return this.visible }

  update(dt) {
    if (!this.visible) return
    this.time += dt
    this.timer -= dt

    // XP count up
    const elapsed = this.duration - this.timer
    if (elapsed > 0.5 && this.xpDisplay < this.xpEarned) {
      this.xpDisplay = Math.min(this.xpEarned, this.xpDisplay + this.xpEarned * dt * 0.8)
    }

    if (this.timer <= 0 && !this.fired) {
      this.fired = true
      this.visible = false
      vibrateRoundComplete()
      if (this.onDone) this.onDone()
    }
  }

  render(ctx) {
    if (!this.visible) return
    const W = CONFIG.W, H = CONFIG.H
    const elapsed = this.duration - this.timer

    const fadeIn = Math.min(1, elapsed * 3)
    const fadeOut = this.timer < 0.5 ? this.timer * 2 : 1
    const alpha = Math.min(fadeIn, fadeOut)

    ctx.save()
    ctx.fillStyle = 'rgba(3, 3, 12, 0.86)'
    ctx.globalAlpha = alpha
    ctx.fillRect(0, 0, W, H)
    ctx.globalAlpha = 1

    // Scale in
    const sIn = Math.min(1, elapsed * 4)
    const scale = easeOutBack(sIn)

    ctx.translate(W/2, H/2 - 60)
    ctx.scale(scale, scale)

    ctx.globalAlpha = alpha
    ctx.font = `900 72px ${CONFIG.FONT_MAIN}`
    prepTextRender(ctx)
    ctx.fillStyle = '#ffd700'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    ctx.fillText(`ROUND ${this.roundNum}`, 0, -60)
    doneTextRender(ctx)

    ctx.font = `700 52px ${CONFIG.FONT_MAIN}`
    prepTextRender(ctx)
    ctx.fillStyle = '#00e5ff'
    ctx.fillText('COMPLETE', 0, 20)
    doneTextRender(ctx)

    ctx.font = `700 38px ${CONFIG.FONT_MAIN}`
    prepTextRender(ctx)
    ctx.fillStyle = '#55efc4'
    ctx.fillText(`+${Math.floor(this.xpDisplay)} XP`, 0, 110)
    doneTextRender(ctx)

    // Tiny hint
    if (this.timer < 1.5) {
      ctx.font = `400 16px ${CONFIG.FONT_BODY}`
      prepTextRender(ctx)
      ctx.fillStyle = 'rgba(203, 213, 225, 0.6)'
      ctx.fillText('NEXT ROUND STARTING…', 0, 180)
      doneTextRender(ctx)
    }

    ctx.globalAlpha = 1
    ctx.textAlign = 'left'
    ctx.textBaseline = 'alphabetic'
    ctx.restore()
  }
}

// --- TRANSITION ---
class Transition {
  constructor() { this.active = false; this.t = 0; this.dur = 0.5; this.phase = 'out'; this.onMid = null; this.onDone = null; this.midFired = false }

  trigger(dur = 0.5, onMid, onDone) {
    this.active = true; this.t = 0; this.dur = dur / 2
    this.phase = 'out'; this.onMid = onMid; this.onDone = onDone; this.midFired = false
  }

  update(dt) {
    if (!this.active) return
    this.t += dt
    if (this.phase === 'out' && this.t >= this.dur) {
      if (!this.midFired) { this.midFired = true; if (this.onMid) this.onMid() }
      this.phase = 'in'; this.t = 0
    }
    if (this.phase === 'in' && this.t >= this.dur) {
      this.active = false; if (this.onDone) this.onDone()
    }
  }

  render(ctx) {
    if (!this.active) return
    const a = this.phase === 'out' ? Math.min(this.t / this.dur, 1) : 1 - Math.min(this.t / this.dur, 1)
    ctx.save()
    ctx.fillStyle = '#05050f'
    ctx.globalAlpha = a
    ctx.fillRect(0, 0, CONFIG.W, CONFIG.H)
    ctx.globalAlpha = 1
    ctx.restore()
  }
}

// --- GAME STATE ---
let currentScene = null
let gameTime = 0

// --- MAIN LOOP ---
let lastTime = performance.now()

function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05)
  lastTime = now
  gameTime += dt

  Particles.update(dt)
  if (currentScene) currentScene.update(dt)

  ctx.clearRect(0, 0, CONFIG.W, CONFIG.H)
  if (currentScene) currentScene.render(ctx)
  Particles.render(ctx)

  pointer.justDown = false
  pointer.justUp = false

  requestAnimationFrame(loop)
}

/** When iframe is embedded in the demo (?embedded=1), lesson finished → notify parent instead of SIGNAL menu. */
function isEmbeddedDemo() {
  try {
    const p = new URLSearchParams(window.location.search)
    return (
      typeof window.parent !== 'undefined' &&
      window.parent !== window &&
      p.get('embedded') === '1'
    )
  } catch (_) {
    return false
  }
}
function embeddedLessonDone() {
  if (!isEmbeddedDemo()) return false
  try {
    window.parent.postMessage(
      { type: 'AKMIND_SIGNAL_LESSON_COMPLETE' },
      window.location.origin
    )
  } catch (_) {}
  return true
}

/** Map URL → starting scene. Lesson 2–4 = canvas lessons; game 1–3 = same (after video track). Old Neuropolis used ?level=1|2|3 — same mapping. */
function initialSceneFromURL() {
  const p = new URLSearchParams(window.location.search)
  let lesson = Number.parseInt(p.get('lesson') || '', 10)
  if (!Number.isFinite(lesson) || lesson < 2 || lesson > 4) {
    const game = Number.parseInt(p.get('game') || '', 10)
    if (game === 1) lesson = 2
    else if (game === 2) lesson = 3
    else if (game === 3) lesson = 4
  }
  if (!Number.isFinite(lesson) || lesson < 2 || lesson > 4) {
    const level = Number.parseInt(p.get('level') || '', 10)
    if (level === 1) lesson = 2
    else if (level === 2) lesson = 3
    else if (level === 3) lesson = 4
  }
  if (lesson === 2) return new Lesson2Scene()
  if (lesson === 3) return new Lesson3Scene()
  if (lesson === 4) return new Lesson4Scene()
  return new MenuScene()
}

  Audio.init()
  await Promise.all([

    Audio.load('wrong', 'game/sounds/wrong.mp3'),
    Audio.load('whoosh', 'game/sounds/whoosh.mp3'),
    Audio.load('victory', 'game/sounds/victory.mp3'),
    Audio.load('click', 'game/sounds/click.mp3'),
    Audio.load('flip', 'game/sounds/flip.mp3'),
    Audio.load('bg', 'game/sounds/bg_music.mp3'),
  ])
  currentScene = initialSceneFromURL()
  Audio.playMusic('bg')
  requestAnimationFrame(loop)
}

function uniqueCardsMerge(a, b) {
  const seen = new Set()
  const out = []
  for (const c of [...a, ...b]) {
    if (seen.has(c.text)) continue
    seen.add(c.text)
    out.push({ ...c })
  }
  return out
}
